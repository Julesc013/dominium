schema_version: aide.context-priority.v0
priority_id: q11-context-priority-v0
status: active-pending-review
purpose: Rank context families for compact packet references without implying full-file inclusion.
families:
  - id: profile
    priority: 100
    patterns:
      - .aide/profile.yaml
  - id: aide-policies
    priority: 95
    patterns:
      - .aide/policies/**
  - id: aide-prompts
    priority: 92
    patterns:
      - .aide/prompts/**
  - id: aide-context
    priority: 90
    patterns:
      - .aide/context/**
  - id: aide-memory
    priority: 88
    patterns:
      - .aide/memory/**
  - id: queue-index
    priority: 86
    patterns:
      - .aide/queue/index.yaml
  - id: current-queue-item
    priority: 85
    patterns:
      - .aide/queue/Q11-context-compiler-v0/**
  - id: root-agent-law
    priority: 84
    patterns:
      - AGENTS.md
  - id: canonical-doctrine
    priority: 83
    patterns:
      - docs/canon/**
      - docs/planning/AUTHORITY_ORDER.md
      - docs/planning/SNAPSHOT_INTAKE_PROTOCOL.md
      - docs/planning/MERGED_PROGRAM_STATE.md
      - docs/planning/EXTEND_NOT_REPLACE_LEDGER.md
      - docs/planning/GATES_AND_PROOFS.md
      - docs/planning/POST_PI_EXECUTION_PLAN.md
      - docs/planning/SEMANTIC_OWNERSHIP_REVIEW.md
      - docs/planning/PLAYER_DESIRE_ACCEPTANCE_MAP.md
  - id: lambda-reality-doctrine
    priority: 82
    patterns:
      - specs/reality/**
      - data/reality/**
  - id: xstack-aide-doctrine
    priority: 81
    patterns:
      - docs/xstack/AIDE_*.md
      - docs/xstack/XSTACK_SCOPE_FREEZE.md
      - docs/xstack/XSTACK_TO_AIDE_EXTRACTION_MAP.md
      - docs/xstack/CODEX_REPO_OPERATING_CONTRACT.md
  - id: root-docs
    priority: 80
    patterns:
      - README.md
      - ROADMAP.md
      - PLANS.md
      - IMPLEMENT.md
      - DOCUMENTATION.md
  - id: harness
    priority: 76
    patterns:
      - core/harness/**
  - id: compatibility
    priority: 74
    patterns:
      - core/compat/**
  - id: shared-core
    priority: 70
    patterns:
      - shared/**
  - id: references
    priority: 68
    patterns:
      - docs/reference/**
  - id: roadmap
    priority: 64
    patterns:
      - docs/roadmap/**
