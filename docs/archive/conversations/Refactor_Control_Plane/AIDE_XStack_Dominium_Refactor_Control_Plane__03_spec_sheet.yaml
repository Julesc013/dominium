spec_sheet:
  metadata:
    chat_label: AIDE, XStack, and Dominium Refactor Control Plane
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This chat only plus explicitly cited live GitHub checks
    apparent_coverage: partial-to-broad visible context
    confidence_1_to_5: 4
    staleness_risk: medium-high
    safe_for_aggregation: yes_with_caveats
    main_limitations:
    - earlier uploaded files expired
    - live repositories may have advanced
    - some user-provided transcripts from other chats are treated as user-supplied context
  summary:
    one_sentence: AIDE should become the repo-native refactor/control plane while XStack becomes Dominium’s strict local profile and legacy validation layer until wrapped and retired.
    short_brief: This chat defines AIDE’s near-term product, XStack’s migration role, Dominium’s root-recycling plan, AIDE Q35-Q57 roadmap, Git/workunit policy, and preservation package.
    main_topics:
    - AI dev workflow
    - harness engineering
    - AIDE architecture
    - XStack migration
    - Dominium convergence
    - root recycling
    - version/capability policy
    - Git/workunit recovery
    - external tool research
    - knowledge preservation
    main_outputs:
    - canvas knowledge docs
    - this zip package
    - registers/spec/context packet
    - Dominium/AIDE plan
    highest_priority_carry_forward:
    - verify current repo state
    - finish CTest/RepoX blockers
    - finish AIDE governance audit
    - build AIDE root recycling/tool absorption machinery
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - repo artifacts outrank chat memory
    - Dominium AGENTS/XStack authority outranks generated AIDE outputs until promoted
    - live repo state must be rechecked before implementation
    staleness_rules:
    - external docs and repo states are stale after capture
    - expired uploads require reupload for exact audit
  user_preferences:
    explicit:
    - Direct, source-grounded, audit-ready answers
    - Detailed knowledge-base summaries for long chats
    - Do not ask for unnecessary confirmation; proceed with best effort
    - Prefer structured markdown and clear headings
    - Do not over-compress important decisions and rationale
    - Correct framing when evidence disagrees
    - Current facts should be verified when possible
    - Separate Dominium work from AIDE work
    - Preserve both human-readable and machine-readable artifacts
    inferred:
    - Prefer structured markdown and clear headings
    - Bias toward anti-complexity and incremental proof
    uncertain_or_not_established:
    - exact final public naming for Kernel/Core
    - exact CTest-warning acceptance threshold
