spec_sheet:
  metadata:
    chat_label: Dominium APP0 Runtime, Platform, and Renderer Architecture
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: THIS CHAT ONLY; PROJECT-CONTEXT explicitly labelled where used
    apparent_coverage: Full visible chat coverage; project attachments not inspected
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - Actual old repository snapshot was not inspected by this package.
    - Prior assistant repo-inspection claim is unverified.
    - Assistant architecture suggestions are not user decisions unless accepted.
    - External graphics API/platform facts require future verification.
  summary:
    one_sentence: 'This chat defined and refined APP0 for Dominium: the application/runtime/platform/renderer layer, with
      strict authority separation and a desired future real resizable windowed executable across supported platform/renderer
      combinations.'
    short_brief: APP0 covers client, server, launcher, setup, tools, renderers, and platform/runtime support while keeping
      engine/game authoritative. The user requested discussion before more prompts, later clarified the final macro-plan should
      produce a real interactive resizable window, granted write permission to render/platform/application/client/server/docs
      only, and asked for a smarter modular architecture supporting broad platform/renderer distribution. The next step is
      to inspect the old code snapshot and verify actual repo structure before prompt generation.
    main_topics:
    - APP0 application/runtime layer
    - Client runtime and real window bring-up
    - Server runtime
    - Renderer architecture and capability model
    - Platform runtime and window/presentation services
    - Launcher orchestration
    - Setup / installer / integrity layer
    - 'Tools: inspectors, validator, replay viewer, editor, profiler'
    - Distribution, modules, plugins, and mix-and-match architecture
    - Old repository snapshot integration and verification
    main_outputs:
    - APP0 implementation pack (prior assistant, not final)
    - Architecture critique
    - Platform runtime proposal
    - Renderer/platform taxonomy proposal
    - Advanced runtime/module/framegraph proposal
    - Maximum-fidelity Context Transfer Packet
    - Final report package
    highest_priority_carry_forward:
    - APP0 scope and authority boundaries
    - Engine/game remain authoritative
    - Current write permissions exclude engine/game
    - Real windowed executable is the macro-plan end state
    - Inspect old repo snapshot before repo-specific plans
    - Platform and renderer should be separate
    - Null/software path before GPU backends
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Explicit user statements outrank assistant proposals.
    - Assistant suggestions are not decisions unless user accepted them.
    - Unverified repo-specific claims must not be merged as facts.
    - Project context must be labelled separately from visible chat facts.
    staleness_rules:
    - External-world facts about APIs, software support, platforms, laws, products, prices, or schedules require future verification.
    - Prior cited links are artifacts, not current authoritative proof.
  user_preferences:
    explicit:
    - id: PREFERENCE-01
      preference: Prefer maximum-fidelity state transfer over normal summaries
      basis: User requested maximum-fidelity Context Transfer Packet and final package
      strength: strong
      implication: Preserve details, uncertainty, registers, artifacts, and next actions.
      risk: Lossy summaries would force re-explanation.
      label: FACT
    - id: PREFERENCE-02
      preference: Prefer discussion before prompt generation
      basis: User said to discuss before planning or generating prompts
      strength: strong
      implication: Do not jump to Codex prompts without explicit request.
      risk: Premature prompt generation may misalign architecture.
      label: FACT
    - id: PREFERENCE-03
      preference: Prefer robust, modular, extensible architecture
      basis: User asked for intelligent, intuitive, robust, compatible, optimized, moddable, modular, extensible design
      strength: strong
      implication: Evaluate designs by long-term maintainability and plug-and-play capability.
      risk: Overly minimal scaffolds may be insufficient.
      label: FACT
    - id: PREFERENCE-04
      preference: Prefer plug-and-play and mix-and-match code/data
      basis: User wants to mix and match code without rewriting or duplication
      strength: strong
      implication: Use interfaces, modules, capability descriptors, and shared code paths.
      risk: Monolithic designs would conflict with goal.
      label: FACT
    - id: PREFERENCE-05
      preference: Prefer broad binary/platform/renderer distribution
      basis: User wants same executable or set of executables across supported systems
      strength: strong
      implication: Design packaging/modules/selection for breadth.
      risk: Naive per-combination binaries may cause matrix explosion.
      label: FACT
    - id: PREFERENCE-06
      preference: Prefer epistemic labels and no invented facts
      basis: User package prompt and prior preferences
      strength: strong
      implication: Use FACT/INFERENCE/UNCERTAIN labels and avoid unsupported claims.
