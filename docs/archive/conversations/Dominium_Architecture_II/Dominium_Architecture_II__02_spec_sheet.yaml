spec_sheet:
  metadata:
    chat_label: Dominium Architecture II
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: Visible chat content only; no project files or external verification used.
    apparent_coverage: Partial visible transcript with prior OC-1 and Context Transfer Packet; some earlier messages skipped.
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - actual repo files not inspected
    - uploaded ZIP not inspected
    - external platform/toolchain/legal facts need verification
    - some early messages skipped
  summary:
    one_sentence: Dominium Architecture II defined the deterministic engine architecture, MVP scope, repository/spec docs,
      Codex prompts, renderer/platform split, Lua data plan, and future roadmap for Dominium.
    short_brief: 'This chat, **Dominium Architecture II**, is a high-density architecture, specification, and Codex-preparation
      session for the Dominium engine/game project. It develops a deterministic, modular, multi-scale simulation engine intended
      to support both retro and modern platforms, with an immediate MVP target and a long-term extensible platform/renderer/data/modding
      architecture. The most important state to preserve is that Dominium is not merely a game idea; in this chat it was shaped
      into a tightly constrained deterministic engine architecture with explicit repository contracts and Codex implementation
      prompts.


      The most important user-defined MVP is: a fully complete core; one full-size Earth surface; all systems interactable
      through minimal data prototypes; Lua for all data; Windows/DX9/Win32/SDL2 path; 2D vector top-down and 3D vector first-person
      rendering. Textures, sounds, music, multiplayer, the Sol system/space expansion, additional renderers, and additional
      platforms are post-MVP.


      Major architectural choices were fixed. The world uses meters with Q16.16 fixed substeps, not a millimeter base. The
      spatial ladder is base-16 from subnano to surface, with sparse chunk/microgrid storage rather than a dense planetary
      grid. The simulation is deterministic, integer/fixed-point, tick-based, C89-compatible in core, and strictly separated
      from platform and renderer code. The renderer is a pure observer. Platform backends handle OS/window/input/time; renderer
      backends handle graphics APIs; the sim never includes OS, DirectX, OpenGL, Vulkan, SDL, or other external platform/graphics
      headers.


      The building and infrastructure model was heavily refined. Buildings use blocks/modules/cells/faces/edges as simulation
      truth, with walls/floors/roofs on grid faces/edges including diagonals. Doors and devices are explicit fixtures on anchors;
      they must not appear automatically or be hardcoded into every tunnel type. Terrain uses immutable base terrain plus
      earthworks deltas/cavities a'
    main_topics:
    - Unified documentation/source-of-truth
    - Deterministic core/kernel
    - ECS architecture
    - Messaging, events, jobs
    - Spatial hierarchy and cosmic identity
    - Terrain, cut/fill, and microgrids
    - 'Building system: cells, faces, edges, fixtures'
    - Vector corridor/spline infrastructure
    - 'Utility networks: power, data, fluids, thermal'
    - Transport systems
    - Pathfinding and deterministic movement
    - Surface vs space and orbital systems
    - Orbital construction/logistics
    - Renderer/platform mix-and-match
    - Lua data and script binding
    - Serialization, save/replay, state hash
    - Build system and CMake
    - MVP client loop and UI/HUD
    - Testing and CI
    - Legal/governance docs
    - Future multiplayer and server universe
    - Future platforms/renderers/assets
    main_outputs:
    - User-provided current directory tree
    - BUILDING.md V4
    - SPEC_CORE.md V4
    - DATA_FORMATS.md V4
    - DIRECTORY_CONTEXT.md V4
    - Codex consistency pass prompt
