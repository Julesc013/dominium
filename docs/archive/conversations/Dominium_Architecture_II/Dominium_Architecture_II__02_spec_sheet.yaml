    - Lua clarification answer
    - OC-1 Discovery Inventory
    highest_priority_carry_forward:
    - MVP scope exactly as user stated
    - Strict deterministic integer/fixed-point core
    - Renderer/platform/sim separation
    - User-provided current file tree
    - V4 BUILDING/SPEC_CORE/DATA_FORMATS/DIRECTORY_CONTEXT
    - docs/dev/dominium_new_addendum.txt addendum location
    - Spatial ladder and Earth/Sol/Milky Way defaults
    - Blocks/cells/faces/edges + explicit fixtures
    - Immutable base terrain + earthworks + microgrids
    - Splines baked into chainpoints/microgrids
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Direct user statements outrank assistant suggestions.
    - Newer user-provided tree and V4 docs outrank older idealized trees.
    - Tentative assistant recommendations remain tentative unless accepted.
    staleness_rules:
    - External platform, API, compiler, licence, product and toolchain claims require verification before implementation/release.
  user_preferences:
    explicit:
    - Maximum-fidelity, structured handoff rather than normal summary.
    - No invented facts or silent inference.
    - Preserve rejected/superseded/deprioritised options.
    - Prioritise direct user statements over assistant suggestions.
    - Use Codex with strict scoped prompts.
    - Vector graphics first; textures/sounds/music later.
    - Lua for all MVP data.
    - Determinism and integer math as non-negotiable.
    - Restrictive licensing.
    - Do not make doors auto-appear; arbitrary explicit placement.
    - Use real file tree and avoid phantom files.
    inferred:
    - Detailed architecture/spec outputs, often as long as possible.
    - Retro and future extensibility kept in architecture even if deferred.
    uncertain_or_not_established:
    - legal jurisdiction for licence
    - exact long-term data format policy
    - whether SDL2 is required in first pass
