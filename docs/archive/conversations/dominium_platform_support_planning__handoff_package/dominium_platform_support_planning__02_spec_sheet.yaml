spec_sheet:
  metadata:
    chat_label: Dominium Platform Support Planning
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: 'THIS CHAT ONLY: visible user/assistant turns in this chat, including the previously generated Context Transfer
      Packet. No web browsing, uploaded files, File Library, or external project materials were used.'
    apparent_coverage: full with caveats
    confidence_1_to_5: 4
    staleness_risk: high
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - No external verification was performed for current platform facts.
    - Prior assistant citations are not portable into future chats.
    - No engine/toolchain, timeline, budget, team, or repository details were established.
    - Some assistant-introduced concepts, especially “Domino,” are unconfirmed.
    - This package intentionally covers only this chat, not the entire Dominium project.
  summary:
    one_sentence: This chat defined Dominium’s platform-support direction, with PC first and Android, iOS, and Web elevated
      to primary top-tier targets after PC.
    short_brief: The chat moved from broad systems/OS support to a comprehensive device-family strategy. The strongest decision
      is that Android, iOS, and Web are primary top-tier support after PC. Consoles, PC handhelds, XR, and legacy systems
      remain important but require tiering, verification, and explicit scope.
    main_topics:
    - Dominium operating system and platform support
    - PC, Android, iOS, and Web Tier-0 priority
    - PlayStation/Xbox/Nintendo console support
    - PC handheld support
    - Android and Apple ecosystem classification
    - Web/WASM/browser/PWA support
    - AR/VR/XR runtime strategy
    - Legacy/retro/constrained support
    - Cross-platform architecture, rendering, input, storage, and QA
    - Report-package handoff and future aggregation
    main_outputs:
    - Current working Tier-0 hierarchy
    - Open/closed/legacy/emulated support classification
    - Context Transfer Packet
    - This final report package
    highest_priority_carry_forward:
    - PC is the first primary platform family.
    - Android is primary top-tier support after PC.
    - iOS is primary top-tier support after PC.
    - Web is primary top-tier support after PC.
    - Mobile and Web should not be treated as late ports.
    - Use a formal platform support matrix/platform contracts.
    - Consoles are desired but gated/secondary unless elevated.
    - Legacy consoles/retro OSes are constrained/research by default.
    - “Domino” engine/core name is unconfirmed.
    - All external platform facts require verification before future use.
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Current system/developer instructions outrank this package.
    - Explicit user statements in this chat outrank assistant suggestions.
    - Latest user statements outrank earlier brainstorms.
    - Assistant claims require verification before becoming implementation facts.
    - Preserve contradictions rather than resolving them silently.
    staleness_rules:
    - SDK, store, browser, console, hardware, OS, and legal/process claims require current official verification.
    - Prior citation IDs from the old chat are not portable.
    - User-provided hardware lists are conversation facts, not verified current-world facts.
