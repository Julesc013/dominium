  risks:
  - id: RISK-01
    risk: Summarisation loss during handoff or aggregation.
    consequence: Future assistants may lose latest priority, unresolved status, or assistant-vs-user distinction.
    likelihood: medium
    severity: high
    mitigation: Use stable IDs, labels, and this package’s full report/YAML/registers together.
    related_workstreams:
    - WORKSTREAM-11
    label: INFERENCE
  - id: RISK-02
    risk: Stale external platform facts.
    consequence: SDK/store/browser/console assumptions may be wrong when implementation starts.
    likelihood: high
    severity: high
    mitigation: Verify all platform facts from current official sources before acting.
    related_workstreams:
    - WORKSTREAM-01
    label: FACT / UNCERTAIN
  - id: RISK-03
    risk: Assistant suggestions treated as user decisions.
    consequence: The project may adopt unconfirmed names, tiers, or technical strategies.
    likelihood: medium
    severity: high
    mitigation: Apply source hierarchy; user statements outrank assistant outputs.
    related_workstreams:
    - WORKSTREAM-01
    label: FACT
  - id: RISK-04
    risk: Tentative or superseded options repeated in future chats.
    consequence: Repeated planning churn and possible contradiction of latest user priority.
    likelihood: medium
    severity: medium
    mitigation: Use Rejected/Superseded register.
    related_workstreams:
    - WORKSTREAM-01
    label: INFERENCE
  - id: RISK-05
    risk: Legal/IP mistakes around console firmware, BIOS, or unofficial tooling.
    consequence: Unsafe or noncommercially viable implementation path.
    likelihood: medium
    severity: high
    mitigation: Use official console paths and avoid proprietary firmware redistribution unless licensed.
    related_workstreams:
    - WORKSTREAM-06
    - WORKSTREAM-09
    label: INFERENCE
  - id: RISK-06
    risk: Mobile/Web constraints under-designed because PC dominates early architecture.
    consequence: Tier-0 Android/iOS/Web support becomes expensive or impossible to retrofit.
    likelihood: medium
    severity: high
    mitigation: Treat mobile and Web as co-equal architecture roots.
    related_workstreams:
    - WORKSTREAM-03
    - WORKSTREAM-04
    - WORKSTREAM-05
    - WORKSTREAM-10
    label: INFERENCE
  - id: RISK-07
    risk: Scope explosion from trying to support every listed device literally.
    consequence: Unbounded engineering, QA, legal, and support burden.
    likelihood: high
    severity: high
    mitigation: Use platform contracts and classify unsupported/research/constrained targets explicitly.
    related_workstreams:
    - WORKSTREAM-01
    - WORKSTREAM-06
    - WORKSTREAM-08
    - WORKSTREAM-09
    label: INFERENCE
  - id: RISK-08
    risk: Engine/toolchain decision remains unknown.
    consequence: Platform feasibility estimates may be speculative.
    likelihood: high
    severity: high
    mitigation: Create an architecture decision record before implementation planning.
    related_workstreams:
    - WORKSTREAM-10
    label: UNCERTAIN / UNVERIFIED
  - id: RISK-09
    risk: PC handheld support overclaimed without device-specific UX/performance testing.
    consequence: Poor Steam Deck/handheld usability despite PC build running.
    likelihood: medium
    severity: medium-high
    mitigation: Define handheld profiles and test on representative devices.
    related_workstreams:
    - WORKSTREAM-07
    label: INFERENCE
  - id: RISK-10
    risk: Retro/legacy work diverts effort from Tier-0 delivery.
    consequence: Primary platform progress slows and architecture may overfit obsolete constraints.
    likelihood: medium
    severity: medium-high
    mitigation: Keep legacy as Tier-2/research unless explicitly elevated.
    related_workstreams:
    - WORKSTREAM-09
    label: INFERENCE
  - id: RISK-11
    risk: Console support promised before official access or certification plan exists.
    consequence: Unreliable roadmap and possible platform-holder/process blockers.
    likelihood: medium
    severity: high
    mitigation: Mark consoles as gated and verify partner/developer requirements.
    related_workstreams:
    - WORKSTREAM-06
    label: INFERENCE
  - id: RISK-12
    risk: Project-context contamination.
    consequence: Report may import preferences, files, or plans not actually established in this chat.
    likelihood: low-medium
    severity: medium
    mitigation: Use THIS CHAT ONLY scope; label external context as PROJECT-CONTEXT if used.
    related_workstreams:
    - WORKSTREAM-11
    label: FACT
  - id: RISK-13
    risk: Bad future aggregation merges distinct workstreams too aggressively.
    consequence: Loss of provenance, contradictions erased, decisions falsely deduplicated.
    likelihood: medium
    severity: high
    mitigation: Use IDs, source labels, and possible cross-chat conflict notes.
    related_workstreams:
    - WORKSTREAM-11
    label: INFERENCE
  - id: RISK-14
    risk: XR support becomes hidden major scope increase.
    consequence: XR renderer/input/comfort requirements could derail core product planning.
    likelihood: medium
    severity: medium-high
    mitigation: Keep XR priority undecided/future until explicitly elevated.
    related_workstreams:
    - WORKSTREAM-08
    label: INFERENCE
  - id: RISK-15
    risk: Support term remains undefined.
    consequence: Different readers may interpret support as full parity, compatibility, emulator-hosted, or research demo.
    likelihood: high
    severity: high
    mitigation: Define support taxonomy before matrix finalization.
    related_workstreams:
    - WORKSTREAM-01
    label: INFERENCE
  - id: RISK-16
    risk: Current hardware status in user list is stale or historically phrased.
    consequence: Examples like “PS5 Pro (announced)” may no longer match current reality.
    likelihood: high
    severity: medium
    mitigation: Treat user list as conversation artifact and verify current market/platform facts later.
    related_workstreams:
    - WORKSTREAM-06
    label: UNCERTAIN / UNVERIFIED
  - id: RISK-17
    risk: Apple-family targets are overgeneralized.
    consequence: Future plan may accidentally imply full Dominium on Apple Watch/tvOS/visionOS without scope.
    likelihood: medium
    severity: medium-high
    mitigation: Classify Apple subplatforms separately.
    related_workstreams:
    - WORKSTREAM-04
    label: INFERENCE
  - id: RISK-18
    risk: Android ecosystem fragmentation is underestimated.
    consequence: Vendor ROMs, Android Go, TV, Automotive, and handheld devices may fail assumptions.
    likelihood: high
    severity: medium-high
    mitigation: Tier Android subtargets and set device/API baselines.
    related_workstreams:
    - WORKSTREAM-03
    label: INFERENCE
  - id: RISK-19
    risk: Web parity is promised without resolving browser/storage/performance limits.
    consequence: Web build may fail to meet full product expectations.
    likelihood: medium
    severity: high
    mitigation: Define Web-specific parity/degradation rules and browser tests.
    related_workstreams:
    - WORKSTREAM-05
    label: INFERENCE
  - id: RISK-20
    risk: OpenXR/WebXR assumptions become stale or device-specific gaps appear.
    consequence: XR plan may be incompatible with targeted devices or runtimes.
    likelihood: medium
    severity: medium
    mitigation: Verify XR runtime status and keep XR secondary until scoped.
    related_workstreams:
    - WORKSTREAM-08
    label: UNCERTAIN / UNVERIFIED
