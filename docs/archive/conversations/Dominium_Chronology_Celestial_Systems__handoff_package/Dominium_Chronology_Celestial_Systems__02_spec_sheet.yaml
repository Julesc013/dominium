spec_sheet:
  metadata:
    chat_label: Dominium Chronology & Celestial Systems
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: THIS CHAT ONLY; PROJECT-CONTEXT appears only where sourced from visible project/system context or user references
      to other Dominium chats.
    apparent_coverage: full visible chat context plus previous context transfer packet
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - No access to actual Plan G/The Game chat or codebase in this chat.
    - Assistant-generated astronomy data and constants require verification.
    - Some planetary/moon calendar names and leap rules remain tentative.
    - Prior implementation language/module claims are unverified.
  summary:
    one_sentence: This chat defined Dominium's multi-scale celestial scope and a modular time/calendar/chronology/knowledge/governance
      architecture from Earth calendars to universal epoch systems.
    short_brief: The chat produced design doctrine, calendar definitions, celestial scope, world-start rules, diegetic time
      knowledge, and handoff prompts for integration with The Game/Plan G.
    main_topics:
    - celestial content scope
    - Sol system detail
    - time core
    - calendars
    - Perfect Earth Calendar
    - planetary/moon calendars
    - world instantiation
    - diegetic HUD
    - governance standards
    - modularity
    - handoff prompts
    main_outputs:
    - Broad celestial body/system category list
    - Sol/Milky Way/Universe inclusion list
    - Canonical Milky Way system set v1.0
    - System-by-system body/site breakdown
    - Gameplay mechanics mapping for celestial features
    - Full Sol system inclusion spec
    - Earth calendar specification
    - Final HPC-E definition
    - Planetary/moon calendar specs
    - Complete calendar inventory
    - Calendar naming layer
    - Leap seconds/relativity doctrine
    - World initialization/time discovery addendum
    - Modularity/extensibility plan
    - The Game chat handoff prompt
    - Celestial content inventory
    - Maximum-fidelity Context Transfer Packet
    - Final downloadable report package
    highest_priority_carry_forward:
    - ACT is authoritative; calendars are pure renderers.
    - HPC-E final month order and intercalary placement.
    - Default date Jan 1 2000 Gregorian; spawn at local sunrise.
    - No initial time/date HUD; time knowledge is diegetic.
    - Time standards are designated by organizations, jurisdictions, regions, and individuals.
    - Sol system has maximum explicit detail.
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Direct user statements outrank assistant proposals.
    - Later user corrections outrank earlier assistant summaries.
    - Tentative assistant-generated names/data require user confirmation or verification.
    - Project-codebase claims from this chat must be checked against the actual project.
    staleness_rules:
    - External-world facts, constants, APIs, standards, and astronomy data require verification before use.
    - Implementation details may be stale or unsupported unless verified in the project.
  user_preferences:
    explicit:
    - id: PREF-01
      preference: Start messages with model version and build date.
      basis: User profile/instructions visible in chat context
      strength: strong
      implication: Future assistants should include model/build header if possible.
      risk: User may view omission as noncompliance.
      label: FACT
    - id: PREF-02
      preference: Be straightforward, critical, and fact-check.
      basis: User profile/instructions
      strength: strong
      implication: Avoid vague reassurance; mark uncertainty.
      risk: Overconfident or soft responses reduce usefulness.
      label: FACT
    - id: PREF-03
      preference: Prefer rigorous, correctly cited, unbiased facts.
      basis: User profile
      strength: strong
      implication: Verify current/scientific facts before hardcoding.
      risk: Assistant-proposed facts may be mistaken.
      label: FACT
    - id: PREF-04
      preference: Avoid making user repeat decisions.
      basis: User requested handoff and package
      strength: strong
      implication: Use packet as memory.
      risk: Loss of continuity wastes user effort.
      label: FACT
    - id: PREF-05
      preference: Use modular, extensible, robust architecture.
      basis: User asked directly
      strength: strong
      implication: Favor plugin/data-driven design.
      risk: Hardcoded design will not scale.
      label: FACT
    - id: PREF-06
      preference: Preserve tentative status and contradictions.
      basis: Current request
      strength: strong
      implication: Do not flatten uncertainty.
      risk: Wrong decisions may be fossilized.
      label: FACT
    - id: PREF-07
      preference: Diegetic/VR-friendly UI for time information.
      basis: User stated
      strength: strong
      implication: No free HUD clock/date.
      risk: Breaks intended realism.
      label: FACT
    - id: PREF-08
      preference: Detailed structured outputs with registers and IDs.
      basis: Current request
      strength: strong
      implication: Use stable IDs/tables.
      risk: Harder aggregation if absent.
      label: FACT
    - id: PREF-09
      preference: High-fidelity Sol system content.
      basis: User stated most playtime in Sol
      strength: strong
      implication: Prioritize Sol detail in spec.
      risk: Underdeveloped core play area.
      label: FACT
    inferred:
    - id: PREF-10
      preference: Second/third-order design thinking.
      basis: User profile and project dialogue
      strength: medium
      implication: Explain implications and failure modes.
      risk: Shallow design may miss systemic interactions.
      label: INFERENCE
    uncertain_or_not_established:
    - Exact implementation language constraints.
    - Final names for all non-Earth calendars.
    - Exact UI visual design.
    - Phase-one implementation scope.
