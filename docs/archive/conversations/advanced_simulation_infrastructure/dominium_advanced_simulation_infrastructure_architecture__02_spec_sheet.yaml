spec_sheet:
  metadata:
    chat_label: Dominium Advanced Simulation and Infrastructure Architecture
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: THIS CHAT ONLY; project-context items labelled PROJECT-CONTEXT
    apparent_coverage: full based on visible chat and prior Context Transfer Packet
    confidence_1_to_5: 4
    staleness_risk: low for internal architecture; medium for future external standards/software facts
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - No repo files inspected
    - No code implemented
    - Existing GPT-5.2 refactor plan unavailable
    - Assistant proposals are not automatically user decisions
  summary:
    one_sentence: This chat planned deterministic Dominium/Domino advanced simulation and grid-agnostic infrastructure/building/decor placement architecture, plus implementation/refactor handoff prompts.
    short_brief: The chat established C89/C++98/fixed-point/data-driven constraints; advanced simulation domains; gameplay command/rules layering; corridor bundles and slots for overlapping infrastructure; generalized host/anchor placement; DECOR signage/markings; arbitrary grid-free placement; and staged Codex/refactor prompts.
    main_topics:
    - Advanced deterministic simulation architecture
    - Gameplay mechanics and end-user feature layering
    - Corridor overlap and co-location model
    - Extensible performant corridor runtime
    - Build-anything real-world infrastructure authoring
    - Signage and road markings
    - General host/anchor placement for buildings, terrain, interiors, and props
    - System linkage map
    - Unified BUILD / TRANS / STRUCT / DECOR / SIM architecture
    - Arbitrary placement / no grid lock
    - Codex implementation prompt plan
    - Existing GPT-5.2 refactor plan integration
    - Context transfer and report packaging
    main_outputs:
    - Advanced Simulation Architecture response
    - Gameplay Mechanics Architecture response
    - Corridor Bundle / Slots response
    - Extensible Performant Corridor response
    - Build Anything Infrastructure response
    - Signage and Road Markings response
    - Universal Host/Anchor Placement response
    - System Linkage response
    - Full BUILD/STRUCT/TRANS/DECOR System Summary
    - Arbitrary Placement / No Grid Lock response
    - Codex Prompt Plan
    - Existing GPT-5.2 Refactor Merge Prompt
    - Maximum-fidelity Context Transfer Packet
    - Final downloadable report package
    highest_priority_carry_forward:
    - Engine grid-agnostic; grids are optional UI snapping aids only.
    - Domino Engine C89; Dominium UI/tools C++98.
    - Fixed-point deterministic math; no floats where determinism matters.
    - No hardcoded game semantics; content defines meaning.
    - BUILD/TRANS/STRUCT/DECOR/SIM responsibilities must stay distinct.
    - Corridor bundles with slots replace competing overlapping splines.
    - Host Surfaces + Anchor Frames generalize placement to all structures, terrain, rooms, and props.
    - DECOR is visual-only unless promoted to device.
    - Authoring data and compiled runtime caches are separate.
    - Use the nine Codex prompts as staged roadmap, but verify repo paths first.
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - User statements outrank assistant suggestions
    - Assistant proposals are not implementation facts
    - Tentative items remain tentative
    - Project-context items require label
    staleness_rules:
    - External/current facts require verification
    - Repository status requires verification
    - Existing refactor plan status requires verification
