      Preference: Use concrete implementation sequencing and Codex-ready prompts when moving toward execution.
      Source basis: Repeated user requests for Codex prompt plans.
      Strength: Medium-High
      Implication: Convert architecture into staged work orders.
      Risk: Implementation planning remains too abstract.
