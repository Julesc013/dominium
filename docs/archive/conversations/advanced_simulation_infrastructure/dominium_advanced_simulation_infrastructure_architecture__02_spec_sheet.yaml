    - ID: PREFERENCE-01
      Preference: Deterministic, technical, concise responses.
      Source basis: Explicit in initial user prompt.
      Strength: High
      Implication: Avoid fluff; keep architecture grounded in deterministic semantics.
      Risk: Future assistant becomes vague or motivational.
      Label: FACT
    - ID: PREFERENCE-02
      Preference: No fluff/filler; ask clarifying questions only if logically required.
      Source basis: Explicit in initial user prompt.
      Strength: High
      Implication: Proceed with best-effort plans when enough information exists.
      Risk: Unnecessary questions slow work and lose continuity.
      Label: FACT
    - ID: PREFERENCE-03
      Preference: Preserve strict layering, modularity, portability, and deterministic semantics.
      Source basis: Explicit in initial user prompt.
      Strength: High
      Implication: Keep BUILD/TRANS/STRUCT/DECOR/SIM/RES boundaries clear.
      Risk: Subsystems become coupled or non-portable.
