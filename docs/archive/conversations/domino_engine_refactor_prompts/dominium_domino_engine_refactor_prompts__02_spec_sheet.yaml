spec_sheet:
  metadata:
    chat_label: Dominium/Domino Engine Refactor Prompts
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: THIS CHAT ONLY; project-level context only where explicitly labelled PROJECT-CONTEXT
    apparent_coverage: full visible-chat coverage with exact prompt wording summarized rather than fully reproduced
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - No repository inspection
    - No actual code/files created before this package
    - Some decisions are inferred from user continuation
    - Plugin policy unresolved
    - Exact fixed-point Q formats unresolved
  summary:
    one_sentence: This chat produced a deterministic-engine architecture and 14-prompt Codex roadmap for Dominium/Domino,
      covering simulation primitives, agents, arbitrary placement, TRANS/STRUCT/DECOR, DLC-generalized domains/knowledge/comms,
      replay, and documentation validation.
    short_brief: The chat established strict C89/fixed-point/no-semantics engine constraints, generalized complex simulation
      and future DLC needs into core primitives, merged arbitrary placement and infrastructure requirements, and generated
      a sequential Codex implementation plan plus documentation validation prompt.
    main_topics:
    - Dominium/Domino deterministic engine architecture
    - Advanced physics and simulation stack
    - Agents, actors, life, ecology, and behavior
    - Engine-wide extensibility, modularity, and performance methodology
    - Custom buildings and infrastructure at scale
    - Generalized Interstellar/Wargames core primitives
    - Arbitrary placement and TRANS/STRUCT/DECOR spatial primitives
    - Master Codex prompt implementation roadmap
    - Documentation validation and normalization
    main_outputs:
    - 14 Codex prompts
    - Documentation validation prompt
    - Maximum-fidelity context transfer packet
    - This final report package
    highest_priority_carry_forward:
    - Hard constraints
    - Sorted delta commit
    - Representation ladder
    - Pose+anchors/no grid lock
    - No baked geometry as truth
    - TRANS slots
    - STRUCT/DECOR authoring-vs-cache split
    - Generic domains/knowledge/comms
    - 14-prompt roadmap
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - User statements outrank assistant suggestions
    - Explicit user constraints outrank inferred plan decisions
    - Unverified repository facts remain unverified
    - Tentative or inferred acceptance must not be upgraded silently
    staleness_rules:
    - Repository and build-system facts require inspection
    - External-world facts/APIs/software versions require verification before use
    - Generated prompts are current only relative to this chat
  user_preferences:
    explicit:
    - id: PREF-01
      preference: Deterministic, technical, concise tone.
      source_basis: User opening tone instructions in visible chat.
      strength: strong
      implication: Future assistant should avoid fluff and maintain technical precision.
      risk_if_misunderstood: Misreading could produce vague architecture or hype.
    - id: PREF-02
      preference: Only ask clarifying questions if logically required.
      source_basis: User opening instructions.
      strength: strong
      implication: Proceed with best-effort architecture when enough information exists.
      risk_if_misunderstood: Excess questions slow flow and repeat known context.
    - id: PREF-03
      preference: Preserve strict layering, modularity, portability, deterministic semantics.
      source_basis: User opening instructions.
      strength: strong
      implication: All future answers must check proposals against these properties.
      risk_if_misunderstood: Violations undermine entire project.
    - id: PREF-05
      preference: Use high-fidelity state transfer and avoid compression.
      source_basis: Current user request asks maximum-fidelity report package.
      strength: strong
      implication: Carry forward details, IDs, registers, artifacts, uncertainty labels.
      risk_if_misunderstood: Lost context would force user to re-explain.
    inferred:
    - id: PREF-04
      preference: Generate Codex prompts in structured implementation phases.
      source_basis: User repeatedly asked for prompt plan and then 'Next'.
      strength: strong inference
      implication: Continue producing prompts with constraints/files/tests/docs/acceptance criteria.
      risk_if_misunderstood: Future assistant may switch to vague summaries instead of actionable prompts.
    uncertain_or_not_established:
    - id: PREF-06
      preference: Citations/fact checking for external facts.
      source_basis: User profile says correctly cited sources and rigorously tested facts; not central to this chat.
      strength: medium
      implication: External-world claims require verification/citations before use.
      risk_if_misunderstood: Could treat stale external facts as current.
    - id: PREF-07
      preference: Start messages with model version/build date.
