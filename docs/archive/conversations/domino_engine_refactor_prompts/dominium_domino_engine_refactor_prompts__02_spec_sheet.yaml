    status: accepted plan decision
    label: INFERENCE
    evidence_or_basis: Assistant proposed; user continued with this plan through Codex prompts.
    rationale: Avoids order-dependent mutation and desync.
    implications: Minds/actions/controllers/solvers emit deltas; PH_COMMIT applies sorted deltas.
