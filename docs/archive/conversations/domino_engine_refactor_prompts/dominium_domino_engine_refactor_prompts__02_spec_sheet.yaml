    uncertainty: none stated
  - id: DECISION-02
    decision: Dominium UI/tools use a portable C++98 subset only.
    status: accepted hard requirement
    label: FACT
    evidence_or_basis: User explicitly stated this.
    rationale: Tooling can be higher-level but must remain portable and outside engine mutation.
    implications: UI/tools must emit deterministic commands rather than mutate state.
    related_workstreams:
    - WORKSTREAM-01
    uncertainty: none stated
  - id: DECISION-03
    decision: No OS/platform/UI/rendering APIs inside engine code.
    status: accepted hard requirement
    label: FACT
    evidence_or_basis: User explicitly stated no OS APIs inside engine code and Dominium is UI/tools only.
    rationale: Strict layer purity and deterministic portability.
    implications: All platform/window/input/FS/process work belongs behind dsys; graphics behind dgfx.
    related_workstreams:
    - WORKSTREAM-01
    uncertainty: none stated
  - id: DECISION-04
    decision: No floats where determinism matters; use fixed-point Q formats.
    status: accepted hard requirement
    label: FACT
    evidence_or_basis: User explicitly stated this; examples include Q16.16/Q24.8.
    rationale: Cross-platform identical simulation.
    implications: All deterministic math, geometry, solvers, placement, and hashes require fixed representation.
