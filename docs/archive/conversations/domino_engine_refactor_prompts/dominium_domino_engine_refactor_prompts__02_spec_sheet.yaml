  decisions:
  - id: DECISION-01
    decision: Domino Engine is ISO C89 only.
    status: accepted hard requirement
    label: FACT
    evidence_or_basis: User explicitly stated this in the opening constraints.
    rationale: Portability and strict deterministic control.
    implications: All engine prompts and code must avoid C99/C++ features.
