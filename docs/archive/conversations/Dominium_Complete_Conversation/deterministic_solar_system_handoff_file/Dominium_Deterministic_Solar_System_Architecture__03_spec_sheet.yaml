  summary:
    one_sentence: "Dominium is being shaped as a deterministic robotic seed-civilisation game using sparse procedural planets, mothership-constrained spawning, nanobot construction, machine graph factories, fog of war, and collapsed simulation."
    short_brief: "The chat began with a feasibility question about deterministic full-scale procedural solar-system/MMO gameplay and evolved into a concrete robotic mothership civilisation premise with automation-first construction and process-graph machines."
    main_topics:
      - "Deterministic Domino simulation core"
      - "Science-bounded procedural planets"
      - "Field layers and sparse deltas"
      - "Robotic mothership and spawn economy"
      - "Nanobot construction and cut/fill"
      - "Automation over worker NPCs"
      - "Machine/factory graph abstraction"
      - "Fog of war and client trust"
      - "Unreal as potential renderer/client"
      - "First vertical slice"
    main_outputs:
      - "Human-readable preservation report"
      - "Structured registers"
      - "Context transfer packet"
      - "Spec sheet"
      - "Aggregator packet"
      - "Audit and verification queue"
    highest_priority_carry_forward:
      - "Formalise vertical slice."
      - "Specify deterministic data core."
      - "Specify field/delta model."
      - "Define mothership economy and robot spawn system."
      - "Design machine graph compiler and fog-of-war model."

  source_rules:
    labels_used:
      - "FACT"
      - "INFERENCE"
      - "UNCERTAIN / UNVERIFIED"
      - "PROJECT-CONTEXT"
    conflict_rules:
      - "Prefer direct user statements over assistant recommendations."
      - "Do not promote brainstorms to final requirements without user confirmation."
      - "When another chat conflicts with this one, preserve both and ask for resolution."
    staleness_rules:
      - "Verify engine, API, data-source, network-scale, and licensing claims before formal use."
      - "Treat prior external citations as leads, not final evidence."

