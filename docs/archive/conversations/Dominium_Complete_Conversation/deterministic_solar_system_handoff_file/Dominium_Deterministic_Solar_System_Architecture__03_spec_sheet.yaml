  decisions:
    - id: DECISION-01
      decision: "Treat Domino as the authoritative deterministic simulation/data core and rendering as a client layer."
      status: "Recommended / not explicitly user-accepted"
      label: "INFERENCE"
      evidence_or_basis: "User asked for determinism and scale; assistant argued the world must be a simulator/database first."
      rationale: "Keeps deterministic state separate from frame-rate, rendering, physics effects, and engine limitations."
      implications: "Shapes engine architecture, networking, save format, and tooling."
      related_workstreams: ["WORKSTREAM-01", "WORKSTREAM-11"]
      uncertainty: "User-stated or strongly supported by visible chat"
    - id: DECISION-02
      decision: "Use science-bounded procedural generation rather than purely arbitrary sliders or manual painting."
      status: "User-stated design direction"
      label: "FACT"
      evidence_or_basis: "User said planets should use real science and sliders should be bounded to realistic ranges."
      rationale: "Supports surprising worlds while preserving plausibility and design control."
      implications: "Affects planet editor, generator constraints, and content pipeline."
      related_workstreams: ["WORKSTREAM-02"]
      uncertainty: "User-stated or strongly supported by visible chat"
    - id: DECISION-03
