    - id: DECISION-08
      decision: "Use the mothership as the recipe book and early precision fabricator, but constrain it with finite resources and throughput."
      status: "User-stated direction"
      label: "FACT"
      evidence_or_basis: "User said the ship already knows designs but should have limited resources/low throughput so players must build industry."
