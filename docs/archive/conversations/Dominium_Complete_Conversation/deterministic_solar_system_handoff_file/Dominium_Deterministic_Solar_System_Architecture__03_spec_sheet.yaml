      status: "User-stated direction with assistant constraints"
      label: "FACT + INFERENCE"
      evidence_or_basis: "User proposed nanobots/invisible force for cut/fill and construction; assistant framed limits to prevent magic."
      rationale: "Avoids expensive labour simulation and makes construction convenient while preserving economy."
      implications: "Affects construction UX, resource ledgers, and deterministic operation validation."
      related_workstreams: ["WORKSTREAM-06"]
      uncertainty: "User-stated or strongly supported by visible chat"
    - id: DECISION-07
      decision: "Deprioritise human-like worker NPC labour and use automation/process graphs instead."
      status: "Strong user-stated preference / tentative design direction"
      label: "FACT"
      evidence_or_basis: "User explicitly said labour is expensive to compute and suggested jumping straight to automation."
      rationale: "Avoids pathfinding/AI costs and aligns with robot civilisation premise."
      implications: "Affects city simulation, construction, logistics, and visual life."
      related_workstreams: ["WORKSTREAM-07", "WORKSTREAM-08"]
