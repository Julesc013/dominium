  summary:
    one_sentence: This chat defined Dominium as a likely deterministic robotic seed-civilisation game built around science-bounded
      procedural planets, a limited mothership, robot spawns, nanobot construction, automation-first cities, and machine process
      graphs.
    short_brief: 'The user moved from a broad feasibility question about full-scale deterministic solar-system/MMO simulation
      to a concrete game premise: players are robot bodies fabricated by a seedship, use ship knowledge and limited resources
      to build industry, avoid worker NPCs, and create factories/machines that compile into process graphs.'
    main_topics:
    - deterministic engine architecture
    - procedural star-system/planet generation
    - field layers
    - robotic mothership lore
    - spawn economy
    - nanobot construction
    - no worker NPC labour
    - machine compiler/process graphs
    - fog of war
    - MMO/single-player modes
    - Unreal integration
    - vertical slice
    main_outputs:
    - human-readable report
    - registers
    - context transfer packet
    - spec sheet
    - aggregator packet
    - audit
    - file export package
    highest_priority_carry_forward:
    - Define first playable slice
    - Define generator/editor model
    - Define field-layer schema
    - Define mothership/spawn economy
    - Define machine compiler
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Direct user statements outrank assistant recommendations.
    - Assistant suggestions need user ratification before becoming final requirements.
    - External facts require verification before merge.
    staleness_rules:
    - Software/API/engine/current capability claims should be rechecked.
    - Scientific data/legal licensing claims should be verified before implementation.
  user_preferences:
    explicit:
    - The user wants maximum-fidelity preservation, not a short summary.
    - The user prefers human-readable explanation before machine-readable handoff.
    - The user prefers uncertainty labels and careful distinction between facts, inferences, and tentative ideas.
    - The user values physically/scientifically plausible procedural generation.
    - 'The user values compute-aware design: sparse state, collapsed sim, avoiding unnecessary NPC/pathfinding/part simulation.'
    - The user wants exportable files and a ZIP when tools are available.
    inferred:
    - 'The user values compute-aware design: sparse state, collapsed sim, avoiding unnecessary NPC/pathfinding/part simulation.'
