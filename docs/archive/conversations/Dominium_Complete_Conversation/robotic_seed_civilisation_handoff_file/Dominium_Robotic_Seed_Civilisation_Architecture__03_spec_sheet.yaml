    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This chat only unless labelled PROJECT-CONTEXT
    apparent_coverage: 'Partial / unclear: visible transcript and uploaded preservation prompt available; hidden earlier context
      not verifiable.'
