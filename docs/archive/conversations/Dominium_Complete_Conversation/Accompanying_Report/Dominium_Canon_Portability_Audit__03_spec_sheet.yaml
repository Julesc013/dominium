    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Repo-materialized canonical docs outrank raw prompts for current repository authority
    - Direct user statements outrank assistant suggestions
    - Code/test evidence outranks documentation claims about implementation status
    staleness_rules:
    - Live repo state must be rechecked before acting
    - External-world examples must be verified before being treated as current
    - Tool outputs from this chat are partial evidence, not a full audit
  user_preferences:
    explicit:
    - Direct, source-grounded, audit-ready answers.
    - Human-readable narrative over machine-readable dumps for chat preservation.
    - Do not treat brainstorms as decisions.
    - Broad/deep architectural reasoning for Dominium structure and future-proofing.
    - Prefer portability, modularity, extensibility, replaceability, and backward compatibility.
    - Use labels FACT/INFERENCE/UNCERTAIN/PROJECT-CONTEXT where important.
