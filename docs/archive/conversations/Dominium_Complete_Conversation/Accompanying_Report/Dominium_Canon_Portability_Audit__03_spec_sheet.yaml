  summary:
    one_sentence: This chat restored old Dominium canon, audited current repo alignment, and defined a contract-first portability doctrine for future-proof engine/game architecture.
    short_brief: The old v1 Constitution and Glossary remain central, but current repo work should use materialized canon docs. The repo is strong at documentation/schema/governance scaffolding and partial at full runtime gameplay implementation. Future-proofing should stabilize contracts and IDs while making implementations replaceable.
    main_topics:
    - v1 canon
    - canonical glossary
    - repo alignment
    - docs vs code
    - portability doctrine
    - ownership-root layout
    - API/ABI/schema/protocol practices
    - chat preservation
    main_outputs:
    - repo alignment assessment
    - portability/modularity doctrine
    - structured preservation package
    highest_priority_carry_forward:
    - verify current repo layout
    - separate docs/schema/code/test proof
    - formalize stable API/ABI/data contracts
    - finish ownership cleanup
    - preserve uncertainty labels
  source_rules:
