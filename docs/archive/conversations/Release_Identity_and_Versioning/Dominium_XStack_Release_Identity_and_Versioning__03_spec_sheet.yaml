  decisions:
    - id: "DECISION-01"
      decision: "Use a layered release identity architecture rather than one universal version string."
      status: "Accepted direction"
      label: "FACT/INFERENCE"
      evidence_or_basis: "Repeated user agreement with separating versions, suite identity, build identity, and compatibility."
      rationale: "A single string cannot safely encode release identity, compatibility, provenance, support class, platform, package type, and suite composition."
      implications: "All release/spec work must keep separate fields for separate meanings."
      related_workstreams: ["WORKSTREAM-01"]
      uncertainty: "confidence 4/5"
    - id: "DECISION-02"
      decision: "Strict SemVer 2.0.0 applies only where there is a declared public API/contract."
      status: "Accepted direction"
      label: "FACT"
      evidence_or_basis: "User explicitly liked strict SemVer 2 compliance for public APIs."
      rationale: "SemVer is compatibility-centric and requires a public API; applying it everywhere would create fake semantics."
      implications: "SDK, engine libraries, protocol/schema/plugin surfaces are candidates; apps/suites need separate policy."
      related_workstreams: ["WORKSTREAM-02"]
      uncertainty: "confidence 5/5"
    - id: "DECISION-03"
      decision: "End-user products and suites may use SemVer-shaped identifiers without claiming strict SemVer semantics."
      status: "Accepted direction"
      label: "FACT"
      evidence_or_basis: "User liked the look of SemVer for non-SemVer things."
      rationale: "Preserves readable familiar shape while avoiding false API compatibility claims."
      implications: "Docs must distinguish true SemVer from SemVer-shaped release IDs."
      related_workstreams: ["WORKSTREAM-01"]
      uncertainty: "confidence 5/5"
    - id: "DECISION-04"
      decision: "Suites/distributions are separate from products/components."
      status: "Accepted direction"
      label: "FACT"
      evidence_or_basis: "User listed standalone products separately from suites; assistant recommended scope=id metadata."
      rationale: "Full/Lite/Net/All are curated distributions, not equivalent to Engine/SDK/Client."
      implications: "Metadata and filenames should include scope=product|suite."
      related_workstreams: ["WORKSTREAM-03"]
      uncertainty: "confidence 4/5"
    - id: "DECISION-05"
      decision: "Suite versions should be human-curated and not strict SemVer."
      status: "Accepted direction"
      label: "FACT/INFERENCE"
      evidence_or_basis: "User proposed suite number as marketing/consumer-facing while components use stricter SemVer."
      rationale: "A suite is a tested bundle/release family, not one API."
      implications: "Suite version should bind to manifest and compatibility/capability metadata."
      related_workstreams: ["WORKSTREAM-03"]
      uncertainty: "confidence 4/5"
    - id: "DECISION-06"
      decision: "GBN belongs in build metadata/manifests as provenance, not SemVer precedence."
      status: "Accepted direction"
      label: "FACT"
      evidence_or_basis: "Discussed repeatedly; user examples used +gbn/build."
      rationale: "SemVer build metadata after + does not affect precedence; GBN is exact build identity/order outside SemVer ordering."
      implications: "Use e.g. +gbn.7137 and store canonical GBN field in manifest."
      related_workstreams: ["WORKSTREAM-04"]
      uncertainty: "confidence 5/5"
    - id: "DECISION-07"
      decision: "BII should primarily be structured manifest metadata, with optional compact projection."
      status: "Tentative accepted direction"
      label: "INFERENCE"
      evidence_or_basis: "Assistant recommendation not contradicted; user asked how BII should be encoded."
      rationale: "Full BII may become too structured/long for version strings."
      implications: "Define BII schema separately; optionally include short token in filename/build metadata."
      related_workstreams: ["WORKSTREAM-04"]
      uncertainty: "confidence 4/5"
    - id: "DECISION-08"
      decision: "Do not encode stable as -stable and do not encode hotfix as a prerelease suffix."
      status: "Accepted direction"
      label: "FACT"
      evidence_or_basis: "Discussed after SemVer reconstruction."
      rationale: "Under SemVer, -stable and -hotfix are prerelease identifiers below the plain release; hotfix should normally be a patch release plus release-class metadata."
      implications: "Use 1.2.3 for stable; 1.2.4 plus release_class=hotfix for hotfix."
      related_workstreams: ["WORKSTREAM-05"]
      uncertainty: "confidence 5/5"
    - id: "DECISION-09"
      decision: "Split prerelease ordering labels from lifecycle/support metadata."
      status: "Accepted direction"
      label: "FACT"
      evidence_or_basis: "Repeated in summary and subsequent user request."
      rationale: "dev/alpha/beta/rc affect ordering; stable/lts/nightly/internal/hotfix describe policy/lifecycle."
      implications: "Channel spec must have separate fields."
      related_workstreams: ["WORKSTREAM-05"]
      uncertainty: "confidence 5/5"
    - id: "DECISION-10"
      decision: "Filenames are readable projections; manifests are canonical truth."
      status: "Accepted direction"
      label: "FACT/INFERENCE"
      evidence_or_basis: "Discussed in artifact naming sections."
      rationale: "Filenames cannot safely carry all metadata or evolve as the only authority."
      implications: "Every artifact should carry or reference a manifest with full identity and compatibility/capability fields."
      related_workstreams: ["WORKSTREAM-06"]
      uncertainty: "confidence 4/5"
    - id: "DECISION-11"
      decision: "Separate support family from exact binary target baseline."
      status: "Accepted direction"
      label: "FACT/INFERENCE"
      evidence_or_basis: "Discussed around DOS/Windows/Mac/Linux platform buckets."
      rationale: "A broad family like Linux5 or WinNT5 is not always an exact compatibility contract."
      implications: "Target taxonomy should include family, baseline, arch, runtime/toolchain profile."
      related_workstreams: ["WORKSTREAM-07"]
      uncertainty: "confidence 4/5"
    - id: "DECISION-12"
      decision: "Use capabilities/contracts internally for compatibility rather than relying on versions alone."
      status: "Tentative direction"
      label: "INFERENCE"
      evidence_or_basis: "User proposed this; assistant endorsed."
      rationale: "Capabilities directly express what can interoperate, especially with backports, partial implementations, optional features, and multidimensional compatibility."
      implications: "Need formal capability registry and negotiation schema."
      related_workstreams: ["WORKSTREAM-08"]
      uncertainty: "confidence 3/5"
