spec_sheet:
  metadata:
    chat_label: "Dominium XStack Release Identity and Versioning"
    date_anchor: "2026-05-27 Australia/Melbourne"
    source_scope: "This chat only unless labelled PROJECT-CONTEXT"
    apparent_coverage: "Partial visible transcript/context plus uploaded prompt"
    confidence_1_to_5: 4
    staleness_risk: "Low for design; medium for external/toolchain/repo claims"
    safe_for_aggregation: "with caveats"
    main_limitations:
      - "No direct repo inspection during preservation task"
      - "No raw full transcript outside visible/current context"
      - "Some build-system claims require verification"
  summary:
    one_sentence: "This chat designed a layered release identity architecture for Dominium/XStack using strict SemVer only for public APIs, SemVer-shaped release IDs for products/suites, GBN/BII for provenance, manifests for truth, and capabilities for internal compatibility."
    short_brief: "The chat moved from general versioning theory to a project-specific release identity model. It separated products from suites, true SemVer components from SemVer-shaped release identifiers, build provenance from precedence, prerelease labels from lifecycle channels, filenames from manifests, and versions from internal capability-based compatibility."
    main_topics:
      - "SemVer 2.0.0 and alternatives"
      - "Layered release identity architecture"
      - "Product vs suite versions"
      - "GBN and BII integration"
      - "Channels and lifecycle metadata"
      - "Artifact naming and manifests"
      - "Platform target taxonomy"
      - "Capability-based compatibility"
    main_outputs:
      - "Knowledge-base summary"
      - "Decision/task/risk/open-question registers"
      - "Context transfer packet"
      - "Spec sheet"
      - "Aggregator packet"
    highest_priority_carry_forward:
      - "Draft Release Constitution"
      - "Create SemVer Component Inventory"
      - "Define suite version semantics"
      - "Formalize GBN/BII and manifest schema"
      - "Design capability registry"
  source_rules:
    labels_used: ["FACT", "INFERENCE", "UNCERTAIN / UNVERIFIED", "PROJECT-CONTEXT"]
    conflict_rules:
      - "Direct user statements override assistant suggestions."
      - "Accepted decisions override earlier exploratory proposals."
      - "Tentative ideas remain tentative until confirmed."
      - "Repo/toolchain claims require verification against current files/docs."
    staleness_rules:
      - "Design decisions are low-staleness unless project priorities change."
      - "External specs, compiler support, OS support, and repo state must be verified before formal adoption."
  user_preferences:
    explicit:
      - "Dislikes versioning policy changes halfway through."
      - "Likes strict SemVer 2.0.0 for public APIs."
      - "Likes SemVer visual shape for non-SemVer release identifiers."
      - "Wants human-readable preservation reports, not machine-only handoffs."
    inferred:
      - "Prefers explicit metadata over hidden inference."
      - "Values long-term maintainability and auditability."
    uncertain_or_not_established:
      - "Exact suite X.Y.Z semantics."
      - "Exact target taxonomy."
      - "Final capability registry shape."
