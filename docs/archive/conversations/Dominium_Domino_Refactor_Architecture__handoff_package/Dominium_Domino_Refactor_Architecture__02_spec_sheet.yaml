spec_sheet:
  metadata:
    chat_label: Dominium + Domino Refactor Architecture
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: 'THIS CHAT ONLY: visible transcript plus the Context Transfer Packet generated in this same chat; no external
      repo inspection performed.'
    apparent_coverage: full for visible chat and prior transfer packet; no live repo audit
    confidence_1_to_5: 5
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - No repository modifications were performed or verified in this chat.
    - Codex prompt application status is unknown.
    - Exact current version numbers are not established.
    - UI/packs architecture is design-level and later-phase.
  summary:
    one_sentence: This chat finalized the Dominium + Domino source/product/version/repo/refactor architecture and produced
      Codex prompts plus a transfer package.
    short_brief: Domino remains the engine under source/domino; Dominium is flattened into common/game/launcher/setup/tools;
      Game is one product with modes; Launcher is the suite hub; DOMINIUM_HOME stores versioned products/mods/packs and instances;
      versioning uses separate core/product/protocol/format identities with Suite=Game.
    main_topics:
    - Domino engine identity and source boundary
    - Dominium source layout flattening
    - Dominium product model
    - Game client/listen/dedicated/demo modes
    - Launcher as main suite hub
    - Setup/install/package management
    - DOMINIUM_HOME repository and instance system
    - Versioning and compatibility metadata
    - Mods, packs, base data, DLC, demo content
    - OS family, architecture, packaging, wrappers
    - Backend selection via dsys/dgfx
    - UI/UX/packs presentation architecture
    - Codex refactor and consistency prompts
    - Starter prompts and future chat continuity
    main_outputs:
    - Master Refactor Prompt
    - Post-Refactor Consistency Pass Prompt
    - Prompt for Codex to generate ChatGPT starter prompt
    - Prompt for Codex to generate Extended Master Starter Prompt
    - Initial Context Transfer Packet
    - Final downloadable report package files
    highest_priority_carry_forward:
    - Flatten source/dominium layout.
    - Do not rename source/domino or install Domino runtime globally.
    - Game is one product with modes.
    - Launcher is main access point and actions-driven.
    - DOMINIUM_HOME repo/instances model.
    - Suite version equals Game version.
    - Base mod version matching is convention, not hard invariant.
