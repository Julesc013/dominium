    evidence_or_basis: User asked bundle vs separate; assistant recommended bundling/static linking; user proceeded.
    rationale: Avoids DLL/runtime version skew.
    implications: Domino is linked/bundled into Dominium products; SDK may be future dev artifact.
    related_workstreams:
