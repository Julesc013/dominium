spec_sheet:
  metadata:
    chat_label: dominium_testx_repox_governance_handoff
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: THIS CHAT ONLY; no direct repo inspection; user-pasted repo tree treated as visible chat context
    apparent_coverage: full visible-context coverage with caveats
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes with caveats
    main_limitations:
    - No direct file inspection performed during package generation
    - Exact full text of generated mega-prompts summarized rather than reproduced line-for-line
    - External toolchain facts require verification
    - Implementation status of proposed systems is unverified
  summary:
    one_sentence: This chat established and reconciled Dominium / Domino governance around TestX, RepoX, build identity, IDE
      projections, language/toolchain constraints, demos/authority, and final context handoff.
    short_brief: 'The chat focused on preserving and enforcing a closed architecture for Dominium / Domino: deterministic
      engine/game, modular content, application shells, repository/toolchain governance, authority-based demo/free distribution,
      and future-proof language/ABI rules. The latest upstream canon supersedes earlier assistant-generated details, especially
      build numbering via BUILD-ID-0.'
    main_topics:
    - Dominium / Domino core engine and game
    - Content system, packs, and zero-asset boot
    - Application layer canon
    - Renderers, platforms, and headless operation
    - TESTX / VALIDATE verification system
    - TESTX2 control layers and non-interference
    - TESTX3 authority, demo, tourist, services, and piracy containment
    - REPOX repository ownership and IDE projections
    - Toolchain and legacy OS matrix
    - TESTX4 language profiles and ABI discipline
    - Policy-as-data and rules-to-checks automation
    - Windows MVP build/test plan with VS2022
    main_outputs:
    - Context Transfer Packet
    - TESTX2 plan/prompt
    - TESTX3 plan/prompt
    - REPOX prompt
    - TESTX4 recommendation
    - Windows MVP build assessment
    highest_priority_carry_forward:
    - Latest upstream canon supersedes earlier assistant-generated prompts where conflicts exist.
    - 'BUILD-ID-0: GBN release-only, BII dev/ci, manual product SemVer.'
    - Architecture closed; implementation/audit only.
    - 'Core ontology: Assemblies, Fields, Processes, Agents, Law.'
    - Engine C89, Game C++98, public headers parseable forever, no C++ ABI leakage.
    - Applications are shells; CLI canonical; UI is data, never logic.
    - Setup is only install mutation authority; tools read-only by default.
    - IDEs are projections; CMake/TestX/RepoX own graph.
    - Content is optional, open-format, capability-provided; zero-asset boot.
    - Demo/free/tourist model uses authority profiles, not code forks.
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Latest upstream canon pasted by user supersedes earlier assistant drafts.
    - Direct user statements outrank assistant suggestions.
    - Assistant brainstorms are not decisions unless accepted by user or upstream canon.
    staleness_rules:
    - Toolchain, SDK, IDE, OS, and external software claims require verification before action.
    - Repo file existence and contents require direct inspection.
