spec_sheet:
  metadata:
    chat_label: Dominium GUI/Binary + CONTENT0 Handoff
    filesystem_label: dominium_gui_binary_content_handoff
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This visible chat only; PROJECT-CONTEXT marks outside/project-level context.
    apparent_coverage: full for visible chat context and previous packet; unclear for inaccessible earlier repo/files
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - No repository/file inspection performed
    - External platform facts require re-verification
    - Linux/Android remain open
    - Assistant suggestions are not user decisions unless labelled FACT from user statement
  summary:
    one_sentence: 'This chat preserves and normalizes Dominium/Domino CONTENT0 content-layer doctrine and the latest GUI/binary
      rebuild direction: CLI mandatory, TUI expected, modular native GUIs attached to shared backends.'
    short_brief: The chat begins with CONTENT0 canonical content population and shifts to a current main workstream of rebuilding
      GUIs and binaries across Windows, macOS, Linux, and Android while preserving CLI/TUI and backend modularity.
    main_topics:
    - CONTENT0 content population
    - full-universe/default datapack
    - Milky Way/Sol canonical content
    - GUI/binary rebuild
    - Windows frontend lanes
    - macOS frontend lanes
    - Linux/Android open strategy
    - backend contract
    - packaging/build matrix
    main_outputs:
    - assistant draft CONTENT0 prompt
    - CONTENT0 critique
    - GUI/binary transfer knowledge base
    - maximum-fidelity context transfer packet
    - this final report package
    highest_priority_carry_forward:
    - GUI rebuild from scratch
    - CLI mandatory
    - TUI expected
    - modular GUIs attached to backends
    - backend contract first
    - CONTENT0 data-only provenance doctrine
    - Linux/Android unresolved
    - verify platform facts
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Direct user statements outrank assistant suggestions.
    - Later user corrections outrank earlier assistant outputs.
    - Assistant drafts are not decisions unless accepted.
    - External facts require re-verification before implementation.
    staleness_rules:
    - Software/toolchain/platform support claims must be rechecked before future use.
    - Links from the previous packet are references, not current guarantees.
