spec_sheet:
  metadata:
    chat_label: Dominium OS-like Architecture, Repository Convergence, and Interface
      Operating Layer
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This chat only unless labelled PROJECT-CONTEXT
    apparent_coverage: Partial but high-fidelity over visible transcript and surfaced
      repo evidence
    confidence_1_to_5: 4
    staleness_risk: Medium
    safe_for_aggregation: Yes, with caveats
    main_limitations:
    - No chronological full /docs walk was possible
    - No docs.zip was visible in loaded files
    - Repo facts are observations from this chat and should be re-verified before
      implementation
  summary:
    one_sentence: This chat reframed Dominium as a deterministic simulation operating
      environment with a reusable Interface Operating Layer rather than merely a game,
      editor, or GUI suite.
    short_brief: The conversation covered GUI/binary lanes, repo convergence, packaging,
      current code reality, OS-like architecture, Workbench, and unified CLI/TUI/rendered/headless
      interface law.
    main_topics:
    - GUI lanes
    - Repository convergence
    - Distribution/versioning
    - Current code audit
    - OS-like environment
    - Workbench
    - Interface Operating Layer
    main_outputs:
    - Architecture synthesis
    - Decision/register set
    - Next tasks
    - Preservation package
    highest_priority_carry_forward:
    - Proof spine
    - Interface law
    - Command unification
    - Rendered-mode law update
    - Workbench modular host
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Current repo contracts override stale historical docs
    - Direct user statements outrank assistant inferences
    - Implementation status requires proof docs or re-verification
    staleness_rules:
    - Re-verify repo/platform/toolchain facts before coding or release claims
  user_preferences:
    explicit:
    - Direct, source-grounded, audit-ready answers
    - Human-readable report first
    - Preserve uncertainty
    - Use stable registers and IDs
    inferred:
    - Long-term architecture over quick demo
    - Strong preference for modular extensible systems
    uncertain_or_not_established:
    - Final product names
    - Exact physical engine/kernel naming
