spec_sheet:
  metadata:
    chat_label: Dominium Application/TestX/CodeHygiene Handoff
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This visible chat only; user-pasted other-chat material labeled PROJECT-CONTEXT.
    apparent_coverage: full for late visible context; partial for earlier hidden/omitted portions
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes_with_caveats
    main_limitations:
    - Actual repo/source/docs were not inspected
    - Generated prompts may not have been executed
    - External Project context is visible only via user-pasted excerpts
  summary:
    one_sentence: This chat consolidated Dominium/Domino application-layer canon, testing/version/changelog governance, source-code
      hygiene, and handoff packaging after a larger architecture design phase.
    short_brief: The latest current artifacts are APP-UNIFIED-CANON for application-layer implementation, TESTX for testing/version/changelog
      governance, CODEHYGIENE-X for source hygiene/data-boundary enforcement, and this final handoff package. Architecture
      is treated as closed and canon locked.
    main_topics:
    - application layer
    - setup and launcher
    - RepoX/TestX/BUILD-ID governance
    - source code hygiene
    - documentation/canon handoff
    - testing and changelog automation
    main_outputs:
    - APP-UNIFIED-CANON
    - TESTX
    - CODEHYGIENE-X
    - Context Transfer Packet
    - final report package
    highest_priority_carry_forward:
    - Do not redesign architecture
    - Use latest application bootstrap and APP-UNIFIED-CANON
    - Verify actual repo state
    - Use BUILD-ID-0 semantics
    - Generated prompts are not executed files
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Explicit user statements outrank assistant suggestions
    - Latest user-pasted bootstrap outranks earlier assistant plans
    - Generated prompts are artifacts, not executed state
    staleness_rules:
    - External software/API/release facts require fresh verification
    - Repo state must be inspected before implementation claims
  user_preferences:
    explicit:
    - id: PREF-01
      preference: Wants maximum-fidelity transfer reports, not normal summaries.
      basis: Current user request
      strength: high
      implication: Future assistants should preserve detail and labels.
      label: FACT
    - id: PREF-02
      preference: Prefers modular, extensible, robust, future-proof designs.
      basis: Repeated user wording throughout chat
      strength: high
      implication: Outputs should emphasize modularity and long-term maintainability.
      label: FACT
    - id: PREF-03
      preference: Wants CLI-only tests/apps unless GUI/TUI specifically required.
      basis: User testing request
      strength: high
      implication: Avoid UI testing friction.
      label: FACT
    - id: PREF-04
      preference: Wants data-driven taxonomies and minimal hardcoded assumptions.
      basis: User code hygiene request
      strength: high
      implication: Use registries/data for open-world concepts.
      label: FACT
    - id: PREF-05
      preference: Wants strict documentation/comment density and cross-referenced blockers.
      basis: User CODEHYGIENE/TESTX requests
      strength: medium-high
      implication: Implement comment/doc policies.
      label: FACT
    - id: PREF-07
      preference: Values auditability, verifiability, and stable IDs.
      basis: Current report package requirements and prior prompts
      strength: high
      implication: Use registers/tables/IDs.
      label: FACT
    inferred:
    - id: PREF-06
      preference: Likes contiguous TXT blocks for Codex prompts.
      basis: Multiple asks for one big txt block
      strength: high
      implication: Provide copy-paste prompts in code fences.
