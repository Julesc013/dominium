spec_sheet:
  metadata:
    chat_label: Dominium Architecture IV
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This chat only; no external verification.
    apparent_coverage: partial
    confidence_1_to_5: 4
    staleness_risk: medium-high
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - Actual repository state unverified.
    - Visible transcript contains skipped sections.
    - External tool/platform details require verification.
    - Some earlier prompt groups are superseded by later roadmap.
  summary:
    one_sentence: This chat defines the Dominium/DoMino architecture, ABI/API stack, backend/product roadmap, and prompt plan
      for implementing a modular multi-platform game ecosystem.
    short_brief: Domino is the reusable engine layer; Dominium is the game/product layer. Current roadmap is ABIs/APIs, platforms,
      renderers, setup, launcher, tools, game. Products are described through contracts, commands, queries, models, views,
      and canvases. Simulation uses deterministic integer/fixed-point policy. Construction, vehicles, space, environment,
      tools, and SDKs are planned as modular systems.
    main_topics:
    - Domino engine
    - Dominium product/game layer
    - Repository structure
    - ABI/API spine
    - Platform API and backends
    - Renderer API and backends
    - Audio API and backends
    - Unified UI system
    - Product contracts and runtime selection
    - Packages, instances, mods, packs
    - Setup product
    - Launcher product
    - Tools and SDKs
    - Game product
    - Numeric, units, time, determinism
    - World/environment fields
    - Construction, vehicles, machines
    - Space, orbits, seamless transitions
    - Actors, AI, jobs, knowledge
    - Economy, markets, politics
    - Plugin, schema, scripting, event infrastructure
    - Save, replay, determinism harness
    - Multiplayer/distributed sim
    - Ports, retro editions, hardening
    main_outputs:
    - Phase 1 ABIs/API Codex prompts
    - Platform backend prompt template
    - Renderer backend prompt template and softref/vtable prompts
    - Setup Phase 4 prompts
    - Launcher Phase 5 prompts
    - Tools Phase 6 prompts
    - Phase 7+ roadmap
    highest_priority_carry_forward:
    - Current implementation order
    - Domino/Dominium split
    - Renderer optionality for non-game products
    - Unified UI mode/backend model
    - Product contracts/capability matching
    - Numeric policy
    - Construction graph model
    - Kepler/space/seamless transition model
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Direct user statements outrank assistant suggestions.
    - Later user changes supersede earlier assistant plans.
    - Superseded options must be preserved.
    staleness_rules:
    - Use 2026-05-27 Australia/Melbourne as date anchor.
    - External-world/tooling/API details require current verification before use.
  user_preferences:
    explicit:
    - id: PREFERENCE-01
      preference: Maximum-fidelity extraction and consolidation.
      area: handoff
      strength: strong
      implication: Do not compress or omit important state.
      label: FACT
    - id: PREFERENCE-02
      preference: Label facts/inferences/uncertainty.
      area: evidence
      strength: hard
      implication: Use FACT/INFERENCE/UNCERTAIN labels.
      label: FACT
    - id: PREFERENCE-03
      preference: No invention or silent inference.
      area: evidence
      strength: hard
      implication: Mark assumptions and gaps.
      label: FACT
    - id: PREFERENCE-05
      preference: Generate Codex prompts one at a time with full context.
      area: planning/coding
      strength: strong
      implication: Avoid broad prompt batches.
      label: FACT
    - id: PREFERENCE-06
      preference: Strong modularity/extensibility planning.
      area: architecture
      strength: very strong
      implication: Plan for plugins/schemas/backends/future systems.
      label: FACT
    - id: PREFERENCE-07
      preference: Native OS installer/UI conventions where appropriate.
      area: UX/platform
      strength: strong
      implication: Use MSI/pkg/deb/native widgets where possible.
      label: FACT
    - id: PREFERENCE-08
      preference: Renderer optional for non-game products.
      area: architecture
      strength: strong
      implication: Launcher/setup/tools must not unnecessarily depend on gfx.
      label: FACT
    - id: PREFERENCE-09
      preference: Common code with arbitrary presentation.
      area: architecture/UI
      strength: strong
      implication: Use views/actions/models/canvases.
      label: FACT
    - id: PREFERENCE-10
      preference: Deterministic fixed-point sim with correct calculations.
      area: numeric/sim
      strength: strong
      implication: Check ranges and units carefully.
      label: FACT
    - id: PREFERENCE-11
      preference: Arbitrary construction over prefab-only design.
      area: gameplay
      strength: strong
      implication: Use construction graph/parts; prefabs as templates.
      label: FACT
    - id: PREFERENCE-12
      preference: Seamless surface/space/scene transitions.
      area: gameplay
      strength: strong
      implication: Use reference frames and tier handoff.
      label: FACT
    - id: PREFERENCE-13
      preference: Comprehensive dev/mod/SDK/editor tooling.
      area: tools
      strength: strong
      implication: Include game/launcher/mod/pack/world/save editors.
      label: FACT
    inferred:
    - id: PREFERENCE-04
      preference: Structured, audit-ready reports/tables.
      area: formatting
      strength: strong
      implication: Use stable IDs, registers, tables.
      label: FACT
    - id: PREFERENCE-14
      preference: Direct technical planning over high-level generalities.
      area: reasoning style
      strength: moderate/strong
      implication: Provide concrete APIs, prompts, paths.
      label: INFERENCE
    - id: PREFERENCE-15
      preference: Prefer long-term compatibility and stable ABIs.
      area: architecture
      strength: strong
      implication: Design versioning and schemas before ecosystem grows.
      label: INFERENCE
    uncertain_or_not_established:
    - Final scripting VM not established.
    - Final schema/manifest format not established.
    - Final default UPS not established.
    - Exact retro backend acceptance criteria not established.
