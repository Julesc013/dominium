  decisions:
  - id: DECISION-01
    decision: Architectural direction is service-first, provider-backed, profile-selected, contract-governed, third-party-fenced.
    status: accepted by user / current doctrine
    label: FACT
    evidence_or_basis: User explicitly restated and endorsed this formulation.
    rationale: Allows raylib/SDL/Lua acceleration without architecture lock-in.
    implications: All provider work, repo layout, manifests, and tests should follow this.
    related_workstreams:
    - WORKSTREAM-02
    uncertainty: See label/confidence.
  - id: DECISION-02
    decision: Use C17 + C++17 as the mainline language baseline, not C89/C++98, pure C99, or pure C++11.
    status: accepted by user
    label: FACT
    evidence_or_basis: User stated transition to C17/C++17 and later provided a transcript defending that baseline.
    rationale: Modernizes implementation while preserving C-compatible boundaries.
    implications: Obsoletes many old toolchain/render assumptions; requires matrix cleanup.
    related_workstreams:
    - WORKSTREAM-03
    uncertainty: See label/confidence.
  - id: DECISION-03
    decision: Minimum first-wave systems are Windows 7 SP1+, Mac OS X 10.9.5+, and Linux, with 64-bit x86_64/ARM64 prioritized.
    status: accepted by user, external specifics unverified
    label: FACT/VERIFY
    evidence_or_basis: User stated these floors directly.
    rationale: Defines what renderers, OS APIs, and toolchains matter first.
    implications: Moves Win9x/XP/Vista/DOS/Win16/Carbon/PowerPC to research/back-port.
    related_workstreams:
    - WORKSTREAM-03
    uncertainty: See label/confidence.
  - id: DECISION-04
    decision: OpenGL 3.3 should be the first direct hardware-rendering target before Direct3D 11.
    status: accepted direction
    label: FACT/INFERENCE
    evidence_or_basis: User argued OpenGL 3.3 helps early Mac/Linux/portable shader work; assistant agreed conditionally.
    rationale: Keeps early rendering cross-platform and shader-first.
    implications: D3D11 remains Windows renderer second; Metal/Vulkan later.
    related_workstreams:
    - WORKSTREAM-04
    uncertainty: See label/confidence.
  - id: DECISION-05
    decision: OpenGL 1.1, OpenGL 2.1, and Direct3D 5/7/8/9 are deferred indefinitely/back-port research rather than first-wave
      targets.
    status: accepted by user
    label: FACT
    evidence_or_basis: User explicitly proposed deferring old fixed-function/old D3D lanes.
    rationale: Reduces architectural burden and lets project focus on shader graphics.
    implications: These can return only if old-host back-port demand justifies them.
    related_workstreams:
    - WORKSTREAM-04
    uncertainty: See label/confidence.
  - id: DECISION-06
