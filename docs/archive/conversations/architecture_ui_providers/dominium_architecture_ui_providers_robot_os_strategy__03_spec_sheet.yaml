spec_sheet:
  metadata:
    chat_label: Dominium Architecture, UI, Providers, and Robot OS Strategy
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This chat only unless labelled PROJECT-CONTEXT
    apparent_coverage: Partial with caveats
    confidence_1_to_5: 4
    staleness_risk: Medium
    safe_for_aggregation: With caveats
    main_limitations:
    - Visible chat includes pasted prior-chat transcripts but not guaranteed full raw older transcripts.
    - External library/toolchain/platform facts require verification before implementation.
    - Repo state referenced in chat may have changed.
  summary:
    one_sentence: This chat converged Dominium toward a service-first provider-backed architecture and a robotic seed-civilisation
      game with an OS-like customizable UI.
    short_brief: Dominium should use C17/C++17, first-party contracts, replaceable providers, profiles, raylib/SDL/Lua as
      fenced providers, shared CLI/TUI/rendered/native UI projections, Workbench as UI artifact factory, and robotic seed-civilisation
      as game identity.
    main_topics:
    - repo layout
    - provider architecture
    - renderer plan
    - language baseline
    - Workbench
    - Robot OS UI
    - robotic seed-civilisation game design
    main_outputs:
    - decisions
    - tasks
    - risks
    - verification queue
    - context packet
    - spec sheet
    - export files
    highest_priority_carry_forward:
    - PROVIDER-WEDGE-01
    - ROBOT-OS-WEDGE-01
    - game design spec extraction
    - matrix cleanup
    - verification of external facts
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Direct user statements outrank assistant suggestions.
    - Explicitly accepted synthesis outranks tentative brainstorming.
    - Current verified repo facts outrank pasted stale reports.
    staleness_rules:
    - External library/toolchain/platform claims go to verification queue.
    - Repo status must be refreshed before implementation.
  user_preferences:
    explicit:
    - Prefers rigorous, source-grounded, audit-ready answers with explicit uncertainty.
    - Prefers intuitive, literal, modular names; dislikes vague labels like compat/universal/ugly compound strings.
    - Prefers long-term portability, modularity, extensibility, and replaceability over quick one-off indie design.
    - Prefers native/OEM+ OS apps and CLI/TUI support across products.
    - Prefers broad, deep strategic synthesis over narrow answers.
    - Prefers human-readable reports before machine-readable registers.
    - Wants downloadable files/ZIP when tools are available.
    - Wants UI/UX to feel like an OS, with deep customization and diegetic robot epistemics.
    inferred: []
    uncertain_or_not_established:
    - Exact preferred Lua version
    - Exact future role of Unreal
    - Exact Linux baseline
