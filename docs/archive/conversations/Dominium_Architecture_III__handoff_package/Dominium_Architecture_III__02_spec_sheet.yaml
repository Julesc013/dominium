      "one_sentence": "This chat defines Dominium launcher architecture, scripts, render/platform backend strategy, software renderer, cameras/views, keybindings, support tiers, and handoff package state.",
      "short_brief": "This chat, labelled **Dominium Architecture III**, focused on Dominium’s launcher, platform/render backend strategy, scripts, input bindings, support tiers, and handoff packaging. The user supplied the standing Dominium project contract: deterministic fixed-step simulation, strict C89/C++98-era constraints, no floats in `/engine/core` or `/engine/sim`, fixed tick phase ordering, deterministic serialization, renderer/audio/UI never mutating simulation, OS boundaries isolated under `/engine/platform`, and explicit CMake sources with no network fetches. Those constraints remain binding for every future implementation decision in this chat.\n\nThe central workstream was the **launcher**. The user first described a launcher UI with tabs **News, Changes, Mods, Instances, Accounts, Settings** and bottom selectors for account, instance, platform, renderer, graphical/headless, and client/server. The architecture then evolved: the launcher is not an in-process mode switcher; selected launcher settings execute separate client or server binaries. The launcher backend/core must be C89, while frontend code for each binary may use C++98. Client/server binaries may be single-system builds, with the launcher and scripts selecting the correct executable. The current desired launcher architecture is system-agnostic and modular: a C89 core for configuration, capabilities, state, view model, and launch-plan creation; platform-specific process adapters; and multiple frontend skins such as engine-rendered software UI, native Win32, CLI, or TUI.\n\nThe user also finalized user-facing entrypoints. The current primary commands are **`dominium`** to launch the launcher, **`setup`** to launch installer/repair/uninstaller, **`dom-client`** to dispatch a client binary, and **`dom-server`** to dispatch a",
