spec_sheet:
  metadata:
    chat_label: Dominium Architecture I
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This visible chat only; project-level context labelled separately when used.
    apparent_coverage: partial
    confidence_1_to_5: 3
    staleness_risk: high for external claims; medium for assistant-generated specs; low for explicit user decisions
    safe_for_aggregation: with caveats
    main_limitations:
    - Many earlier turns are collapsed/skipped.
    - Top-level docs/legal docs/context MDs are referenced but not visible.
    - Generated specs contain API and language-standard inconsistencies.
    - No repo files or external facts were inspected.
  summary:
    one_sentence: Dominium Architecture I is a retired architecture/spec-generation chat that produced a large per-file Codex
      devspec corpus for a deterministic cross-platform simulation game, with continuation point game/g_world.cpp.txt and
      major API conflicts requiring canonicalisation.
    short_brief: 'This chat, labelled **Dominium Architecture I**, is a retired architecture/specification chat for the **Dominium
      Game** project. The visible thread is not a normal project-planning chat; it is primarily a long-running specification-generation
      session meant to prepare Dominium for automated implementation with **Codex 5.1 Max**. The user’s explicit workflow
      changed during the chat: the initial idea was for Codex to read a full transcript and compile a complete v3 “book of
      volumes,” but the user later decided that Codex could not reliably read the entire context at once. The workflow therefore
      shifted to creating a **set of `.txt` implementation-spec prompt files**, one per file in the intended repository tree.


      The dominant artifact stream is a large **`devspec/` file tree**. The user provided the full directory/file list, skipped
      top-level `.txt` files because original Markdown docs already exist in `/docs/...`, and then repeatedly instructed the
      assistant to proceed in strict order. Visible generated specs cover much of the architecture: engine modules from math/memory/ECS/jobs/save/replay/network/log/config/serialization/locale;
      platform abstraction backends; render abstraction a'
    main_topics:
    - Final report package for retired chat
    - Dominium Game architecture
    - Codex per-file devspec automation
    - Spec v3 volume corpus
    - Top-level docs, context MDs, and legal/policy docs
    - Engine core specs
    - Platform abstraction specs
    - Rendering specs
    - Audio specs
    - Systems layer specs
    - Game layer specs
    - UI layer specs
    - Launcher specs
    - Mods and base Lua specs
    - Tools specs
    - Data schema specs
    - Test specs
    - Build and CI script specs
    - API canonicalisation and contradiction repair
    - External compatibility, legal, and tool verification
    main_outputs:
    - Context Transfer Packet
    - This report package
    - Large visible devspec prompt inventory
    highest_priority_carry_forward:
    - Resume file generation at game/g_world.cpp.txt if continuing strict sequence.
    - Per-file .txt specs are the primary Codex workflow.
    - Use UTF-8 internally with retro fallbacks.
    - Semantic versioning with metadata build provenance.
    - Determinism is core.
    - Skip top_level devspec because /docs originals exist.
    - Duplicate dweather/dhydro/dai_core specs must be reconciled.
    - dmem and dserialize APIs are inconsistent in drafts.
    - C89/C++98 compliance is intended but violated in drafts.
    - External platform/tool/legal claims require verification.
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - User statements outrank assistant outputs.
    - Duplicate generated specs must remain unresolved until canonicalised.
    - Assistant-generated pseudo-code is draft guidance, not final API truth.
    staleness_rules:
    - External tool/platform/library/legal/API claims require current verification.
    - Internal user decisions remain useful unless contradicted by later user direction.
