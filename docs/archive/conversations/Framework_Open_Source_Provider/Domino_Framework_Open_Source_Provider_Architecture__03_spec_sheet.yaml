spec_sheet:
  metadata:
    chat_label: Domino Framework and Open-Source Provider Architecture
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This chat only unless labelled PROJECT-CONTEXT
    apparent_coverage: Partial but substantial visible-chat coverage; past-chat links inaccessible
    confidence_1_to_5: 4
    staleness_risk: Medium/High
    safe_for_aggregation: With caveats
    main_limitations:
    - Cannot guarantee full transcript outside visible chat context
    - External project facts and repo state may be stale
    - Some decisions are accepted directions rather than implemented decisions
  summary:
    one_sentence: This chat established a service-first Domino Framework/provider architecture for accelerating Dominium with
      raylib, SDL2, Lua, and other open-source references while preserving first-party simulation, contracts, saves, replays,
      packs, UI documents, and deterministic sparse distributed game law.
    short_brief: The conversation moved from open-source bootstrap strategy to a Domino Framework model where providers such
      as raylib/SDL2/Lua implement stable first-party services. It also framed sparse deterministic delegated simulation and
      CAD-to-runtime graph compilation for the intended game vision.
    main_topics:
    - open-source framework approach
    - raylib ecosystem providers
    - SDL2/Lua providers
    - service-first directory structure
    - Domino Framework split
    - reference projects
    - sparse deterministic delegated simulation
    - CAD/machine systems
    - preservation package
    main_outputs:
    - provider doctrine
    - directory model
    - decision/task/risk registers
    - DOMINO-FRAMEWORK-WEDGE-01 plan
    - aggregation packet
    highest_priority_carry_forward:
    - Define minimal Domino Framework ABI
    - Verify repo C17/C++17 baseline and dependency floors
    - Implement provider manifests and forbidden include validator
    - Create null and raylib provider proof
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Prefer direct user statements over assistant suggestions
    - Treat stale external facts as verification items
    - Do not merge unseen past chats
    staleness_rules:
    - Verify versions/licenses/platform support/repo state before implementation
  user_preferences:
    explicit:
    - Direct, audit-ready, source-grounded answers with uncertainty labels.
    - Human-readable explanation first, not just machine registers.
    - Do not ask whether to proceed; proceed with best effort.
    - Do not treat brainstorms as decisions.
    - Preserve rejected/superseded options and contradictions.
    inferred:
    - Use modular framework/provider approach rather than monolithic fork.
    - Keep responses structured with headings/tables where useful.
    uncertain_or_not_established:
    - Exact license tolerance for GPL/LGPL
    - Exact dependency versions
    - Exact first implementation branch
