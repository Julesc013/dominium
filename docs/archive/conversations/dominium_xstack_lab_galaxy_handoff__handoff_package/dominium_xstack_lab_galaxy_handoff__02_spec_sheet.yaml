      and a later 13-prompt Lab Galaxy substrate transcript requiring verification.
    short_brief: Dominium is a deterministic universe simulation/game project with a portable XStack agentic development suite.
      This chat moved from governance frustration to a mature XStack doctrine and then recorded a user-reported 13-prompt
      Lab Galaxy substrate run with schemas, packs, registry compile, session boot, observation, lab navigation, astronomy
      packs, tool UI, ROI/SRZ, packaging, and thematic commits.
    main_topics:
    - Dominium / Domino deterministic simulation architecture
    - XStack portable agentic development suite
    - Lab Galaxy deterministic substrate
    - Canonical docs, glossary, and README/documentation front door
    - Survival and gameplay vertical slice
    - Future realism/domain pack extensibility
    main_outputs:
    - Dominium Constitutional Architecture & Execution Contract v1 / constitution_v1.md
    - Canonical glossary v1.0.0 / glossary_v1.md
    - AGENTS.md
    - docs/contracts/*.md
    - UAEP-1 / UAEP-1H prefix
    - tools/xstack/run / run.cmd / run.py
    - scripts/dev/gate.py
    - tools/xstack/repox, testx, auditx, controlx, performx, compatx, securex
    - XStack production hardening reports
    - .gitignore update for tools/xstack/out/**
    - schemas/*.schema.json
    - tools/xstack/compatx/schema_validate/version_registry
    highest_priority_carry_forward:
    - Verify actual repo state before trusting transcript.
    - Preserve XStack removability.
    - Preserve no-mode-flags and process-only mutation.
    - Audit old gate.py vs tools/xstack/run.
    - Audit tracking/ignore policy and docs/audit artifacts.
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Current user statements override this report.
    - Repository files override transcript claims.
    - Direct user statements override assistant suggestions.
    - Tentative brainstorms are not decisions.
    staleness_rules:
