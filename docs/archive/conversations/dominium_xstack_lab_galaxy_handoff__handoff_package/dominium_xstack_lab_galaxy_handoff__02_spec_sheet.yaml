    uncertainty: Repository implementation must be verified.
  - id: DECISION-02
    decision: All mutation must occur through Processes.
    status: accepted
    label: FACT
    evidence_or_basis: User repeatedly wanted process-only mutation; AGENTS/canon prompts enforce it.
    rationale: Preserves deterministic replay and prevents hidden state changes.
    implications: UI/tools/camera/survival actions must emit intents/processes, not mutate fields directly.
    related_workstreams:
    - WORKSTREAM-01
    - WORKSTREAM-03
    - WORKSTREAM-05
    uncertainty: Need code audit for violations.
  - id: DECISION-03
    decision: TruthModel, PerceivedModel, and RenderModel must remain separated.
    status: accepted
    label: FACT
    evidence_or_basis: Prompt 7 and prior design; renderer must never access TruthModel.
    rationale: Prevents epistemic leakage and multiplayer/client cheating.
    implications: UI binds only to PerceivedModel; renderer consumes RenderModel only.
    related_workstreams:
    - WORKSTREAM-01
    - WORKSTREAM-03
    uncertainty: Need test/build boundary verification.
  - id: DECISION-04
    decision: Use named RNG streams, fixed-point authoritative logic, and replay hashes for determinism.
