  decisions:
  - id: DECISION-01
    decision: Use Assemblies, Fields, Processes, Agents, and Law as the core ontology.
    status: accepted
    label: FACT
    evidence_or_basis: Repeatedly specified in the conversation and constitutional prompt.
    rationale: Provides a minimal stable model for simulation, gameplay, extension, and governance.
    implications: All mechanics must reduce to these primitives.
    related_workstreams:
