  decisions:
  - id: DECISION-01
    decision: Domino engine is ISO C89.
    status: decided
    label: FACT
    evidence: User Extended Master Starter Prompt.
    rationale: Maximal portability and stable C ABI across retro/modern platforms.
    implications: Domino modules cannot use C99/C11 or C++ features.
    related_workstreams:
    - WORKSTREAM-01
    uncertainty: none
  - id: DECISION-02
    decision: Dominium product/UI code may use portable C++98 subset where needed.
    status: decided
    label: FACT
    evidence: User Extended Master Starter Prompt.
    rationale: Allows product/UI structure while preserving old-platform portability.
    implications: No C++11+, exceptions, RTTI-heavy design, or modern STL assumptions unless user later changes policy.
    related_workstreams:
    - WORKSTREAM-01
    uncertainty: none
  - id: DECISION-03
    decision: All platform interaction must go through dsys.
    status: decided
    label: FACT
    evidence: User Extended Master Starter Prompt.
    rationale: Prevents platform divergence and direct OS calls in products/sim/render logic.
    implications: Windowing/input/fs/process/timing abstractions belong in dsys/platform backends.
    related_workstreams:
    - WORKSTREAM-01
    uncertainty: none
  - id: DECISION-04
    decision: All rendering must go through dgfx IR/backends.
    status: decided
    label: FACT
    evidence: User Extended Master Starter Prompt.
    rationale: Supports software/GPU/retro renderers without product-side native drawing.
    implications: GUI/TUI/game rendering cannot call OS-native immediate drawing APIs directly.
    related_workstreams:
    - WORKSTREAM-01
    - WORKSTREAM-03
    - WORKSTREAM-05
    uncertainty: none
  - id: DECISION-05
    decision: Software renderer is mandatory baseline.
    status: decided
    label: FACT
    evidence: User Extended Master Starter Prompt.
    rationale: Deterministic baseline and fallback for retro/no-GPU targets.
    implications: GPU backends optional; soft must remain functional.
    related_workstreams:
    - WORKSTREAM-01
    - WORKSTREAM-05
    uncertainty: none
  - id: DECISION-06
    decision: Vector-only fallback UI/pack path must always function.
    status: decided
    label: FACT
    evidence: User Extended Master Starter Prompt.
    rationale: Products must work with zero raster packs installed.
    implications: Built-in vector style/icon/theme fallback required.
    related_workstreams:
    - WORKSTREAM-01
