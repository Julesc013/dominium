  summary:
    one_sentence: This chat preserves and hardens the Dominium Launcher application-layer plan after canonical repo, engine
      purity, CMake, contracts, UI IR, RepoX/TestX, and BUILD-ID governance were locked.
    short_brief: The launcher is a first-class product under launcher/, not an engine subcomponent; engine purity, neutral
      contracts, setup-only install mutation, CMake-authoritative VS2026 workflow, CLI canonical command graph, UI IR, RepoX/TestX,
      and BUILD-ID-0 are the carry-forward anchors.
    main_topics:
    - Dominium / Domino application-layer canon
    - Dominium Launcher product
    - Engine purity and boundary enforcement
    - Setup product and launcher/setup boundary
    - Neutral contracts and canonical schemas
    - UI command graph, UI IR, accessibility, and localisation
    - VS2026, CMake, CI, and build/test gates
    - RepoX, TestX, VALIDATE-0, and BUILD-ID-0 governance
    - Tools and validators
    - Client and server application constraints
    - This chat handoff and report package
    main_outputs:
    - Launcher realignment plan
    - Launcher hardening Codex prompt
    - Context Transfer Packet
    - Final report package
    highest_priority_carry_forward:
    - Do not redesign architecture.
    - Verify repo state before acting.
    - Use launcher hardening prompt if not applied.
    - Preserve boundary rules and superseded options.
