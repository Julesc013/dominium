  spec_book_notes:
    likely_sections:
    - Language Baselines
    - ABI and Plugin Boundaries
    - Facade/Backend Architecture
    - Capability Registry
    - Determinism Grades
    - Platform Roadmap
    - Renderer Roadmap
    - TLV Serialization
    - Networking Handshake
    - Build Matrix and Smoke Tests
    - Future AAA Roadmap
    unique_contributions:
    - Final 9-prompt active Codex pack
    - Integrated mandatory constraints
    - Commit discipline and changelog pipeline
    - Product GUI smoke tests as done gate
    possible_duplicates_with_other_chats:
    - Master engine-core prompts 1-14
    - Determinism policy
    - TRANS/STRUCT/DECOR details
    - AAA future roadmap items
    conflicts_to_watch_for:
    - Tier-2 runtime-complete vs compile-gated scope
    - Repo file paths/targets not verified
    - Superseded plans versus active final pack
    formal_requirements_candidates:
    - Use C89 for Domino core forever.
    - Use C++98 for Dominium layer forever.
    - C99/C11/C++11+ are optional acceleration layers only.
    - Reject runtime language-standard switching.
    - All ABI-relevant boundaries use C ABI, POD structs, explicit function tables.
    - Every interface struct begins with u32 abi_version and u32 struct_size.
    - Use facade + backend architecture for all evolvable subsystems.
    - Use a centralized capability registry for backend selection.
    - Use determinism grades D0/D1/D2.
    - Lockstep strict requires D0 only.
    - Treat serialization/assets/saves/replays as public ABI.
    - Networking handshake must include build/schema/determinism/content hashes.
    - Launcher profiles select feature profiles/backends, not language standards.
    - Final active plan is the 9-prompt post-master pack.
    - Codex must make detailed commits throughout.
    - Tier-1 platform completion focuses on Win32 and Win32 headless.
    - Software renderer is D0 reference backend.
    - DX9 is Tier-1 runtime-present backend.
    - Tier-2 platforms/renderers are gated and compile-correct in current pack.
    - Launcher and game need basic GUI smoke tests.
    background_context_candidates:
    - Future AAA feature roadmap
    - Superseded prompt plans
    - Initial platform/render questionnaire answers
    needs_user_confirmation:
    - Whether master prompts 1-14 have run
    - Full runtime Tier-2 scope
    - UI text strategy
    - Legacy format migration scope
  final_recommendations:
    next_action_if_continuing_this_chat: Run or hand off Final Prompt 1 to Codex after verifying repository state.
    next_action_for_aggregator: Ingest spec_sheet.yaml and aggregator_packet.md, preserving labels and superseded-plan status.
    user_checks_required:
    - Confirm active prompt pack remains desired
    - Confirm master prompt implementation status
    - Download/store package files
