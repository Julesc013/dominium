spec_sheet:
  metadata:
    chat_label: Dominium/Domino Architecture and Codex Prompts
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This visible chat only; no repo/files inspected.
    apparent_coverage: full for visible chat with implementation caveats
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - No repository code was inspected or modified.
    - Generated Codex prompts are work orders, not evidence of implementation.
    - Some assistant proposals were carried forward but may require user confirmation.
    - Existing code may be stale or divergent.
  summary:
    one_sentence: This chat defined the Dominium/Domino architecture and Codex prompt roadmap, then prepared handoff material
      for continuing with Path D advanced simulation.
    short_brief: Domino is a deterministic C89 engine; Dominium is a C++98 product layer; real game content must live in packs/mods/TLV.
      The chat generated an architecture and prompts 1-18 covering core infra, content, GUI, demo slice, advanced simulation,
      logistics, production, research/economy, netcode, and tools.
    main_topics:
    - Domino Engine Core Infrastructure
    - Dominium Product Suite
    - Repository, Instance, and Compatibility Model
    - Content, Packs, Mods, TLV, and Base Pack
    - DRES Resource System
    - Environment, Hydrology, Atmosphere, and Lithology
    - Buildings, Construction, Placement, and Sloped Terrain
    - Transport and Logistics Splines
    - Packaging and Containers
    - Structures, Machines, and Generic Process Runner
    - Vehicles and Weapons as Compiled Runtime Objects
    - Jobs, Agents, AI, and Factory Orchestration
    - Research, Organizations, Economy, and Policies
    - Multiplayer, Netcode, Replay, and Determinism
    - GUI, Renderer, View, and UI Framework
    - Toolchain, Editors, and Authoring Pipeline
    - Advanced Simulation Path D
    - Codex Prompt Roadmap and Chat Handoff
    main_outputs:
    - Extended Master Starter Prompt — Dominium + Domino
    - dres modular resource proposal from another chat
    - Complete integrated system summary
    - Data/type hierarchy output
    - Engine-wide hierarchy output
    - Full stack engine+game+launcher+setup+tools+mods hierarchy
    - Extensibility refinement pass
    - Codex prompt split plan (7 prompts)
    - Prompt 1 — Core Infrastructure & Registries
    - Prompt 2 — Content & Proto Layer
    - Prompt 3 — World/Res/Env/Build/Trans/Struct/Vehicle/Job
    - Prompt 4 — DSIM/ECS, Net, Replay, View, UI
    - Prompt 5 — Dominium Common Layer
    - Prompt 6 — Game Product
    - Prompt 7 — Launcher, Setup, Tools
    - Prompt 8 — Minimal GUI Vertical Slice
    - Prompt 9 — Base Pack Structure, TLV Schemas, Autoload
    - Prompt 10 — Data-Driven Playable Minimal Slice
    - Prompt 11 — Minimal GUI Gameplay Loop
    - Prompt 12 — Determinism, Validation, Boundaries
    - Prompt 13 — World-Scale Physical Systems
    - Prompt 14 — Logistics Splines, Construction, Packaging
    - Prompt 15 — Production Chains, Jobs/AI, Economy
    - Prompt 16 — Research, Orgs, Macro-Econ, Policies
    - Prompt 17 — Multiplayer, Netcode, Sessions
    - Prompt 18 — Toolchain & Editors
    - New Chat Advanced Simulation Starter Prompt
    - Maximum-fidelity Context Transfer Packet
    - Final report package request and generated files
    highest_priority_carry_forward:
    - No hardcoded actual content in engine/core.
    - C89/C++98 language split.
    - Fixed-point deterministic simulation.
    - GUI-first testing preference.
    - Path D advanced simulation is the next new-chat focus.
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Direct user statements outrank assistant suggestions.
    - Assistant suggestions remain tentative unless accepted or built upon.
    - Generated prompts are artifacts, not proof of implementation.
    - Later stricter data/code separation should govern implementation.
    staleness_rules:
    - External/current facts require verification before use.
    - Actual repo/build/dependencies require inspection.
    - Prompt assumptions are not repo facts.
