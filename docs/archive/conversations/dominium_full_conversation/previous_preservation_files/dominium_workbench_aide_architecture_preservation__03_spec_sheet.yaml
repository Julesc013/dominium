    - This preservation package
    highest_priority_carry_forward:
    - Verify live repo state
    - Run/review FULL-GATE-LEGACY-TEST-ROUTE-01
    - Generate remaining maintenance prompts
    - Proceed to PROJECTION-CONFORMANCE-01
