spec_sheet:
  metadata:
    chat_label: Dominium World Architecture
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: THIS CHAT ONLY; includes previous Context Transfer Packet visible in this chat.
    apparent_coverage: full visible-chat coverage with repo-unknown caveats
    confidence_1_to_5: 4
    staleness_risk: low for internal design, medium for toolchain/software assumptions
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - No actual repo files inspected
    - Previous Codex prompt has known technical defects
    - Several solver formulas remain unresolved
  summary:
    one_sentence: This chat designed the deterministic fixed-point world, save, environment, modding, and implementation architecture
      for a Dominium-style game world.
    short_brief: 'This chat was a sustained architecture-design session for the **Dominium World Architecture** workstream.
      It defined how a future Dominium-style game world should represent space, terrain, saves, runtime memory, deterministic
      simulation, environmental systems, tools, mods, and a Codex implementation plan. The most important output is not a
      single feature spec but a coherent design philosophy: all authoritative simulation state should live in deterministic,
      fixed-point, content-agnostic core structures, while chunks/segments are storage and cache boundaries only.


      The final spatial model is a power-of-two hierarchy with named scales from Plank through Surface. The horizontal surface
      is a toroidal 2^24 metre grid in X/Y, with X east and Y north. Z is not toroidal; the user confirmed one Page of vertical
      space, 4096 m total, centered at sea level, meaning roughly 2 km down and 2 km up. Chunk size is 16×16×16 m, giving
      256 vertical chunk layers. Runtime positions use an 8-bit Segment index plus local Q16.16 precision; save positions
      use Q4.12 local-to-chunk. The packet identifies a critical correction to the prior Codex prompt: signed Q16.16 cannot
      represent the full local segment range [0,65536), and signed Q4.12 cannot represent the full chunk-local range [0,16).
      Future work should use unsigned local fixed types or an explicitly centered signed coordinate scheme.


      The user imposed hard implementation constraints: no floats in the core or save files; C89 for the core; C++98 and ...'
    main_topics:
    - Spatial coordinate model and scale hierarchy
    - Deterministic fixed-point C89 core
    - Sparse save file architecture
    - Runtime memory model, chunking, streaming, and continuity
    - Continuous terrain, geometry, materials, and media
    - FluidSpaces, hydrology, weather, climate, rooms, tanks
    - Oil fields, gas pockets, pressure, ruptures, flooding, rivers
    - Thermal, hydraulic, electrical, logic, and limited EM systems
    - Mod/content system, registries, JSON/Lua, content.lock
    - 'Whole-project modular architecture: engine, runtime, launcher, tools, mods'
    - Codex implementation prompt and code generation plan
    - Testing, verification, determinism, seam validation
    - Documentation, reports, and future Project Spec Book
    main_outputs:
    - Context Transfer Packet
    - Codex implementation prompt draft
    - This final report package
    highest_priority_carry_forward:
    - Correct fixed-point signedness before coding
    - Core/saves have no floats
    - Surface is toroidal 2^24m X/Y and one Page Z
    - Chunks are caches, not authorities
    - Use content.lock and deterministic registries
