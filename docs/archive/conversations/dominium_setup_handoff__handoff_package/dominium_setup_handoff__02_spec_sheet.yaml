    - id: PREF-07
      preference: User prefers shallow, logical, industry-practice directory structures.
      source_basis: User asked directory-tree questions
      strength: medium-high
      implication: Avoid unnecessary nesting and generic source dirs.
      risk: Structural complexity causes confusion.
      label: FACT
    - id: PREF-08
      preference: User wants downloadable, reusable report packages for old chats.
      source_basis: Current request
      strength: high
      implication: Create files/ZIP if possible.
      risk: Plain summary alone is insufficient.
      label: FACT
