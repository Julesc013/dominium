spec_sheet:
  metadata:
    chat_label: Dominium Setup Handoff
    filesystem_safe_label: dominium_setup_handoff
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: THIS CHAT ONLY; project-level context is labelled PROJECT-CONTEXT where pasted from other chats.
    apparent_coverage: full for visible chat plus prior Context Transfer Packet; actual repo state not verified
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - Actual repository state after the two applied Codex prompts is not verified.
    - Some large prompts are summarized rather than reproduced in full, except the generated setup hardening prompt.
    - Assistant proposals such as libs/appcmd and a UI IR path are not user-locked decisions.
  summary:
    one_sentence: This chat defined, realigned, and preserved the Dominium Setup system as the sole deterministic installation
      authority, then packaged the resulting context for future continuation and aggregation.
    short_brief: The chat evolved from setup architecture and directory planning into canonical repo alignment, CMake/VS2026
      build enforcement, engine purity/contract ownership, schema-based setup-launcher handoff, application-layer canon, and
      final context-transfer/report packaging.
    main_topics:
    - Dominium Setup / Installer System
    - Canonical Repository Structure and CMake/VS2026 Build Enforcement
    - Engine Purity and Neutral Contract Ownership
    - Setup Schemas and Setup ↔ Launcher Handoff
    - Application Layer Canon
    - Packaging, Reproducibility, Offline and Network Acquisition
    - CLI/TUI/GUI Command Model and UI IR
    - RepoX/TestX/BUILD-ID-0 Governance
    - Legacy Platform Support
    - Context Transfer and Report Packaging
    main_outputs:
    - Plan S setup plan of plans
    - Canonical setup structure realignment
    - Phase 2 authoritative setup tree
    - Generated setup hardening prompt
    - Maximum-fidelity Context Transfer Packet
    - Final report package
    highest_priority_carry_forward:
    - Setup is sole install mutation authority.
    - Canonical setup layout supersedes old adapters/source/packaging trees.
    - Existing implementation is authoritative unless violating canon.
    - Verify actual repo state before acting.
    - Execute or audit the setup hardening prompt.
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - Latest explicit user canon outranks earlier assistant plans.
    - Direct user statements outrank assistant suggestions.
    - Assistant proposals remain tentative unless accepted or canonized.
    - Actual repo inspection outranks this report for file state.
    staleness_rules:
    - External-world facts, tool versions, SDK behavior, store rules, APIs, laws, prices, and schedules require future verification.
    - Repository state in this report is stale until inspected.
  user_preferences:
    explicit:
    - id: PREF-01
      preference: Responses should start with GPT-X.Y — YYYY-MM-DD HH:MM:SS local time.
      source_basis: User profile/instructions
      strength: high
      implication: Future assistants should preserve prefix unless higher-priority rules conflict.
      risk: User may consider response malformed if omitted.
      label: FACT
    - id: PREF-02
      preference: Optimize for epistemic accuracy, decision utility, and long-term correctness.
      source_basis: User profile/instructions
      strength: high
      implication: Use labels, verification queues, avoid unsupported claims.
      risk: Overconfident summaries degrade trust.
      label: FACT
    - id: PREF-03
      preference: Separate FACT, INFERENCE, ESTIMATE/UNCERTAIN where relevant.
      source_basis: User profile/instructions and current request
      strength: high
      implication: Registers should preserve provenance.
      risk: Tentative items may become false decisions.
      label: FACT
    - id: PREF-04
      preference: Engineering precision, no marketing tone.
      source_basis: Multiple user prompts
      strength: high
      implication: Use concrete file-level plans and checklists.
      risk: Verbose hype or vague prose is unwanted.
      label: FACT
    - id: PREF-05
      preference: Do not restart locked plans; continue and amend.
      source_basis: User canonical setup prompt
      strength: high
      implication: Respect canon and existing implementation.
      risk: Redesign wastes work and may violate canon.
