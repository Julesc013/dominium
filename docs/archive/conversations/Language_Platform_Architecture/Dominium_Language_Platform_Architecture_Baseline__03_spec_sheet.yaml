      - "Some previously uploaded files outside the current prompt may have expired."
  summary:
    one_sentence: "This chat set Dominium's mainline direction to C17 + C++17, 64-bit, little-endian, C-compatible ABI, contract-governed modular architecture."
    short_brief: "The conversation superseded the old C89/C++98 baseline and rejected pure C99/C++11 pivots. It established C17 for deterministic law and C++17 for machinery, with providers, packs, modules, Workbench, AIDE, contracts, tests, and evidence as the modular integration spine."
    main_topics: ["language baseline", "C vs C++ split", "ABI", "determinism", "platform tiers", "64-bit", "providers", "packs/modules", "Workbench/AIDE", "Foundation Lock"]
    main_outputs: ["human-readable report", "registers", "context packet", "spec sheet", "aggregator packet", "future bootstrap prompt", "ZIP package"]
    highest_priority_carry_forward: ["FOUNDATION-REPAIR-DEPENDENCY-DIRECTION-01", "update C89/C++98 stale wording", "architecture profile contract", "composition resolver", "lockfiles"]
  source_rules:
    labels_used: ["FACT", "INFERENCE", "UNCERTAIN / UNVERIFIED", "PROJECT-CONTEXT"]
    conflict_rules:
      - "Direct user decisions override assistant recommendations."
      - "Repo contracts/specs override informal wording unless superseded."
      - "External platform/toolchain claims require verification before formal support claims."
    staleness_rules:
      - "Verify compiler, OS, library, console, and platform support facts against current official sources."
