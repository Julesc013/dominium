    chat_label: "Dominium Language, Platform, and Architecture Baseline"
    date_anchor: "2026-05-27 Australia/Melbourne"
    source_scope: "This chat only; repo/project context labeled where used"
    apparent_coverage: "partial-to-high for visible chat; incomplete for other old chats"
    confidence_1_to_5: 4
    staleness_risk: "medium"
    safe_for_aggregation: "with caveats"
    main_limitations:
