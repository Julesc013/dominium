    next_action_if_continuing_this_chat: "Draft and execute FOUNDATION-REPAIR-DEPENDENCY-DIRECTION-01."
    next_action_for_aggregator: "Merge this chat into language/platform/ABI/determinism/modularity chapters, preserving uncertainty labels."
