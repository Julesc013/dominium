spec_sheet:
  metadata:
    chat_label: Dominium UI Editor + Tool Editor Planning
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: THIS CHAT ONLY; uploaded files and Project-level context are listed only where explicitly present in this
      visible chat.
    apparent_coverage: full visible chat; partial actual implementation state
    confidence_1_to_5: 4
    staleness_risk: medium
    safe_for_aggregation: yes, with caveats
    main_limitations:
    - uploaded files uninspected
    - generated prompts not implementation evidence
    - some assistant recommendations unconfirmed
  summary:
    one_sentence: This chat planned the Dominium DUI-based UI Editor and future Tool Editor ecosystem, including canonical
      TLV tooling, CLI automation, launcher/setup capability tests, and IDE live-preview workflows.
    short_brief: The user wants a Windows-first UI Editor to bootstrap a cross-platform/self-hosting Tool Editor for Dominium
      tools, built on the existing DUI TLV system with native controls and deterministic automation.
    main_topics:
    - Existing Dominium DUI/TLV Runtime System
    - Phase A Windows UI Editor
    - Phase B Self-Hosting Tool Editor
    - Canonical UI IR / TLV / JSON Toolchain
    - Generic Backend Capability System
    - Deterministic Layout Engine
    - Splitter / Tabs / ScrollPanel Widgets
    - Action/Event System and Codegen
    - DUI Win32 Structural Runtime Fixes
    - UI Discovery + Legacy Import/Export
    - UI Editor CLI Headless Modes
    - ops.json Deterministic Script Engine
    - Launcher Minecraft-Style Logical Layout Capability Test
    - Setup Minecraft-Style Logical Wizard Capability Test
    - Hardening, Determinism, CI Capability Test
    - IDE-Native Live Editing Workflows
    main_outputs:
    - Prompt plan 1-11
    - Final UI Editor prompt
    - UU1-UU6 prompts
    - IDE live editing prompt
    - Context Transfer Packet
    - This report package
    highest_priority_carry_forward:
    - UI Editor first, Tool Editor second
    - Existing DUI/TLV system is the foundation
    - TLV canonical; JSON mirror read-only/default if small
    - Native widgets are required; Minecraft-style means logical layout only
    - UI Editor must have CLI and ops.json automation
    - Do not assume prompts were executed
    - Uploaded bundles were not inspected
    - Generic capability system across all backends
    - Stable action keys + registry codegen + gen/user split
    - Tool Editor eventually self-hosts and edits all tools
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - direct user statements outrank assistant recommendations
    - tentative items remain tentative
    - do not assume prompt execution
    staleness_rules:
    - verify tool versions, APIs, IDEs, repo state, and uploaded files before use
