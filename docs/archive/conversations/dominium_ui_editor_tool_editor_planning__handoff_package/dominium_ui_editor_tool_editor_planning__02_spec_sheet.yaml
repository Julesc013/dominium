      strength: strong
      implication: Avoid filler and preserve rigor.
      risk: Future assistant may over-soften or over-summarize.
    - id: PREF-02
      preference: Correct citations and fact checking where external facts are used
      label: FACT
      source: User profile
      strength: strong
      implication: Use sources for current/external claims.
      risk: Unsupported factual claims reduce trust.
    - id: PREF-03
      preference: Few but detailed Codex prompts optimized for GPT-5.2/Codex
      label: FACT
      source: User requested prompt plan with few detailed prompts
      strength: strong
      implication: Generate large explicit implementation prompts, not many tiny ones.
      risk: Fragmented prompt plan wastes effort.
    - id: PREF-04
      preference: Small batches of clarifying questions during requirements refinement
      label: FACT
      source: Initial user instructions
      strength: strong
