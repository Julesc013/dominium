    confidence: high
    label: FACT/INFERENCE
  - id: WORKSTREAM-05
    name: Reusable engine/product-line architecture
    objective: Separate code by reuse level across Dominium products, future games, and unrelated engine projects.
    current_state: Outlined in final architecture response.
    desired_end_state: Reusable layers isolated from Dominium-specific game rules.
    status: active
    priority: P0
    confidence: high
    label: FACT/INFERENCE
  - id: WORKSTREAM-06
    name: Contracts/API/ABI/schema/protocol discipline
    objective: Make public seams versioned, stable where promised, and negotiable.
    current_state: Outlined as doctrine; implementation pending.
    desired_end_state: Contracts define identity and compatibility; public ABI seams are durable.
    status: active
    priority: P0
    confidence: high
    label: INFERENCE
  - id: WORKSTREAM-07
    name: Naming and matrix cleanup
    objective: Use clean component names with version/status/format fields separated.
    current_state: Discussed in pasted component-naming analysis.
    desired_end_state: No durable names like legacy/modern/compat/XStack/gl2/vk1/dx11-as-primary.
