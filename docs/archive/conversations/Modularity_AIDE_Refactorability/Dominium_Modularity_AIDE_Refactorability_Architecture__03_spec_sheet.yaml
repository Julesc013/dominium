  - id: DECISION-05
    decision: Design Dominium as a product-line architecture, not a one-off game.
    status: accepted objective
    evidence_or_basis: User explicitly requested proper game/OS-like architecture and reusable code.
    rationale: Supports reuse across products, games, and projects.
    implications: Requires stricter separation of engine/game/runtime/contracts/tools/content.
    related_workstreams: WORKSTREAM-05
    confidence: high
    label: FACT
  - id: DECISION-06
    decision: Use C89-compatible stable ABI seams, without forcing all internals to be C89.
    status: recommendation
    evidence_or_basis: Assistant proposed this refinement.
    rationale: Stable external seams with flexible implementation.
    implications: Public headers need opaque handles, allocators, versioned structs, error codes.
    related_workstreams: WORKSTREAM-06
    confidence: medium
    label: INFERENCE
  - id: DECISION-07
    decision: Avoid durable architecture names based on temporary tooling or status labels.
    status: accepted direction
    evidence_or_basis: User disliked XStack framing; prior component naming analysis rejected legacy/modern/compat labels.
    rationale: Prevents temporary migration scaffolding becoming permanent ontology.
    implications: Use boring literal names and matrix fields.
    related_workstreams: WORKSTREAM-07
    confidence: high
    label: FACT/INFERENCE
  - id: DECISION-08
    decision: Future refactors should be AIDE work units with move maps and salvage maps.
    status: recommendation aligned with user goal
    evidence_or_basis: User wanted future refactors easy and quick.
    rationale: Turns restructuring into a mechanical process.
    implications: Requires AIDE refactor schemas, ledgers, validators, and temporary aliases.
    related_workstreams: WORKSTREAM-03
    confidence: high
    label: INFERENCE
  - id: DECISION-09
    decision: Apps should be thin; runtime adapts host; engine/game own truth.
    status: strong recommendation
    evidence_or_basis: Repeated in architecture doctrine.
    rationale: Preserves portability and prevents UI/rendering/platform code owning simulation truth.
    implications: Boundary validators needed.
    related_workstreams: WORKSTREAM-05
    confidence: medium-high
    label: INFERENCE
  - id: DECISION-10
