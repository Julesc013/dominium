spec_sheet:
  metadata:
    chat_label: Dominium Modularity, AIDE Refactorability, and Future-Proof Architecture
    date_anchor: 2026-05-27 Australia/Melbourne
    source_scope: This chat only unless labelled PROJECT-CONTEXT
    apparent_coverage: Partial-to-good for visible chat; no live repo inspection
    confidence_1_to_5: 4
    staleness_risk: Medium
    safe_for_aggregation: With caveats
    main_limitations:
    - No live repo verification
    - No full old-chat transcript beyond visible current conversation
    - Prior generated files not available
    - Pasted repo-status claims unverified
  summary:
    one_sentence: This chat defines Dominium as a reusable, portable, contract-driven game/engine platform governed by AIDE-backed
      refactorability rather than ad hoc folder cleanup.
    short_brief: 'The conversation moved from distribution/source layout cleanup to a full modularity and future-proofing
      doctrine: stable root constitution, logical-root projections, AIDE control plane, product-line reuse boundaries, contracts/manifests
      as identity, versioned APIs/schemas/protocols, deterministic tests, and mechanical future refactors.'
    main_topics:
    - Unified layout projection system
    - Stable source repo constitution
    - AIDE as restructuring control plane
    - Product-line architecture and reuse levels
    - Contracts, API, ABI, schemas, and protocols
    - Naming and component matrices
    - Build, dependency, and visibility discipline
    - Determinism, data, compatibility, and testing
    - Preservation and aggregation
    main_outputs:
    - Architecture doctrine
    - AIDE transition plan
    - AIDE-STRUCTURE-00 task
    - AIDE-ARCH-00 task
    - Preservation package
    highest_priority_carry_forward:
    - Verify live repo state
    - Implement AIDE-STRUCTURE-00
    - Inventory and wrap old tooling
    - Implement AIDE-ARCH-00
  source_rules:
    labels_used:
    - FACT
    - INFERENCE
    - UNCERTAIN / UNVERIFIED
    - PROJECT-CONTEXT
    conflict_rules:
    - User statements outrank assistant suggestions
    - Live repo verification outranks pasted old status
    - Do not silently merge project context
    staleness_rules:
    - Repo status, commits, current docs, external tools, and API claims require verification before implementation
  user_preferences:
    explicit:
    - Direct, human-readable explanations first; machine-readable registers second.
    - Broad and deep architectural reasoning, not shallow folder advice.
    - Preserve uncertainty and distinguish facts from inferences.
    - Avoid repeating previously rejected XStack-style ontology as durable architecture.
    - Code should be reusable across games and projects, not one-off.
    inferred:
    - Future work should be executable by Codex/AIDE with clear tasks.
    uncertain_or_not_established:
    - Exact compatibility windows
    - Exact API stability levels per module
    - How much generated output should be tracked
  workstreams:
  - id: WORKSTREAM-01
    name: Stable repo constitution
    objective: Define stable top-level ownership roots and refuse future root sprawl.
    current_state: Conceptually defined in chat; needs implementation.
    desired_end_state: Contracts, docs, validators, and root admission policy exist and are enforced.
    status: active
    priority: P0
    confidence: high
    label: FACT/INFERENCE
  - id: WORKSTREAM-02
    name: Distribution and install projection
    objective: Unify package, portable, installed, media, cache, rollback, bundle, save, and diagnostics layouts through logical
      roots.
    current_state: Strongly described in pasted prior analysis; not verified against live repo.
    desired_end_state: One logical-root projection contract drives all physical layouts.
    status: active
    priority: P0
    confidence: medium
    label: FACT/UNCERTAIN
  - id: WORKSTREAM-03
    name: AIDE control plane
    objective: Use AIDE for migration, validation, evidence, queues, move maps, salvage maps, and refactor history.
    current_state: User explicitly preferred AIDE over XStack-style framing.
    desired_end_state: AIDE owns restructuring workflow; old tools are wrapped and recycled.
    status: active
    priority: P0
    confidence: high
    label: FACT
  - id: WORKSTREAM-04
