  - chapter: 14
    title: "Reality, Space, Time, and Scale"
    part: "Part IV - Simulation and World Model"
    tags:
      - "world"
      - "determinism"
    relevant_source_content_to_summarize_in_prose: "Current doctrine supplies the generic law: deterministic process, authoritative truth, observation, and provenance. The conversations add pressure for large-scale worlds, visitability, temporal resilience, timekeeping, and representations that can refine without breaking truth. The unresolved issue is how much of that long-horizon world model is current spec versus design ambition. Domain volumes define where reality exists and which laws apply. Domain queries are deterministic, budgeted, and SDF-based. Dominium/Domino is a deterministic world runtime and law-governed simulation OS. Travel scheduling, replay, and law decisions become nondeterministic. 1. 'the source material' 2. 'the source material' 3. 'AGENTS.md' 4. scope-specific canonical planning, semantic, schema, contract, release, and policy artifacts named by the active task 5. operational registries, projections, mirrors. The project is about invention, production, logistics, economics, settlement, trust, communication, and institutional power emerging from lawful simulation rather than scripted outcomes. Commands, processes, packs, capabilities, diagnostics, evidence. The conclusion was not a finalized implementation but a working architecture: each simulation domain should be deterministic, fixed-point, content-driven, versioned, replayable, and integrated through clear read/write boundaries. This context matters because the rest of the conversation happened inside those constraints. The launcher could not become a dumping ground for OS-specific behavior, sim mutation, renderer decisions, or nondeterministic game-state changes. It had to fit. The user pasted the final README after those cleanup changes. At that point, the README had the current active form: deterministic constraints clarified, ports unified under one source hierarchy, '/ports' metadata-only if retained, Section 9 normative. The entire conversation is anchored by the requirement that Dominium must run deterministically. This means the same initial state and same inputs must produce the same state across machines, compilers, operating systems, and eventually retro and modern. The 32-bit question followed. The answer was to make full native products 64-bit and keep 32-bit as constrained or projection support only. The key caveat was not to make native pointer size part of game law. Save, replay, network, IDs, and renderer IR. The current queue does not authorize broad feature work. Broad Workbench UI, runtime module loading, provider runtime, package runtime, gameplay, renderer implementation, native GUI, and release publication remain blocked until later reviewed phases. Save/replay integrity depends on identical macro transitions. Before reading the rest of this report, remember this: this chat's central contribution is not one isolated feature. It is a whole design philosophy for Dominium's world engine. The game should be deterministic, fixed-point, sparse, modular. The discussion proposed target-based CMake and module boundaries rather than path mythology. Public headers, private headers, allowed dependencies, and forbidden dependencies should be explicit. Apps must remain thin. Engine must not depend on. Refusal and defer semantics are part of determinism and replay guarantees. 'archive/': historical, superseded, quarantined, or provenance-retained. It is not established whether the user prefers Unreal, Raylib, or a fully custom renderer long-term. It is not established how realistic the science model should be, how punishing respawn should be, how many robot bodies should exist, whether official. The unique contribution is the synthesis: Dominium should not be framed only as a game or editor suite; it should be a deterministic operating environment with a reusable interface layer. This likely overlaps with other chats on worldgen, domain realism."
