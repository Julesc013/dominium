nsistently treat Domino as reusable infrastructure rather than a one-off game binary. Domino is the deterministic substrate. Dominium is the official game, product, and domain layer. Workbench is a governed validation and inspection environment. Setup and launcher compose product instances. Tools validate, generate, audit, and migrate. Repo truth keeps Engine, Game, Client, Server, Workbench, setup, launcher, tools, contracts, and content in separate roles. Conversation-derived material reinforces the boundary: renderer and UI project state, clients issue intents, server/game/engine. Client and renderer project data and issue intents; they do not author authoritative outcomes. Do not perform silent migrations or compatibility reinterpretation. 'platform' (39 conversations): runtime shell, platform adapter, renderer boundary, operating-system support, and portability. Sources: Dominium Advanced Simulation and Infrastructure. Do not infer ownership from similarly named roots. The current repo should not be overstated as a complete runtime implementation of all v1 goals. Full agent gameplay loops, MMO distributed authority runtime, embodiment, and narrative/campaign systems were described as deferred in repo status docs. The exact first playable slice remains unresolved. The first provider wedge is clear, but exact sequence between client/workbench gameplay, Robot OS, and gameplay mechanics still needs a formal milestone. The exact Lua version, Linux baseline, current. Factories and machines should also be multi-representation systems. Nearby, they can look detailed and physical. Far away, they should collapse into process graphs and equations: inputs, outputs, power draw, heat, throughput, buffers, maintenance debt."
