name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  repo-sanity:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: IDE quarantine
        run: python scripts/verify_ide_quarantine.py --repo-root .
      - name: Tree sanity
        run: scripts/verify_tree_sanity.bat
      - name: UI shell purity
        run: python scripts/verify_ui_shell_purity.py --repo-root .
      - name: ABI boundary check
        run: python scripts/verify_abi_boundaries.py --repo-root .
      - name: Performance envelope baseline
        run: python tools/perf/tool_run_performance_envelope.py --repo-root . --platform-tag win64

  ci-dev:
    name: CI-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Strict build (dev lane)
        run: python scripts/ci/run_strict_build_and_annotate.py --repo-root . --build-dir build/ci_dev --label "dev lane"
      - name: Impact graph and impacted tests
        run: |
          python tools/dev/dev.py --repo-root . impact-graph
          python tools/xstack/testx_all.py --repo-root . --profile FAST --cache on
      - name: AuditX scan
        run: python tools/auditx/auditx.py scan --repo-root . --changed-only --format both
      - name: Upload dev artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-dev-artifacts
          path: |
            build/impact_graph.json
            docs/audit/auditx
            tools/xstack/out/fast/latest

  ci-verify:
    name: CI-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Strict build (verify lane)
        run: python scripts/ci/run_strict_build_and_annotate.py --repo-root . --build-dir build/ci_verify --label "verify lane"
      - name: STRICT profile
        run: python tools/xstack/run.py --repo-root . --cache on strict
      - name: Packaging dry-run
        run: python tools/setup/build.py --repo-root . --bundle bundle.base.lab --out build/ci_verify_dryrun --cache on
      - name: Upload verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-verify-artifacts
          path: |
            tools/xstack/out/strict/latest
            build/ci_verify_dryrun
            docs/audit/auditx

  ci-dist:
    name: CI-dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Strict build (dist lane)
        run: python scripts/ci/run_strict_build_and_annotate.py --repo-root . --build-dir build/ci_dist --label "dist lane"
      - name: Full verify with deterministic packaging
        run: |
          python tools/xstack/run.py --repo-root . --cache on strict
          python tools/setup/build.py --repo-root . --bundle bundle.base.lab --out build/ci_dist_a --cache on
          python tools/setup/build.py --repo-root . --bundle bundle.base.lab --out build/ci_dist_b --cache on
      - name: Assemble deterministic portable bundle
        run: python tools/dist/tool_assemble_dist_tree.py --repo-root . --platform-tag win64 --channel mock
      - name: Verify assembled portable bundle
        run: python tools/dist/tool_verify_distribution.py --repo-root . --platform-tag win64
      - name: Compare deterministic dist hashes
        run: |
          python -c "import json; a=json.load(open('build/ci_dist_a/manifest.json','r',encoding='utf-8')); b=json.load(open('build/ci_dist_b/manifest.json','r',encoding='utf-8')); assert a.get('canonical_content_hash')==b.get('canonical_content_hash'); assert a.get('pack_lock_hash')==b.get('pack_lock_hash')"
      - name: Upload dist artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-dist-artifacts
          path: |
            build/ci_dist_a
            build/ci_dist_b
            tools/xstack/out/strict/latest

  projection-sanity:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: ide-win-vc6-win9x-client-gui
          - os: ubuntu-latest
            preset: ide-linux-gcc295-legacy-client-gui
          - os: macos-latest
            preset: ide-mac-xcode3-universal-setup-gui
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Projection regen clean
        run: python scripts/verify_projection_regen_clean.py --repo-root . --preset ${{ matrix.preset }}

  docs-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docs sanity
        run: python3 scripts/verify_docs_sanity.py --repo-root .

  build-test:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: native UI + soft renderer.
          - os: windows-latest
            name: win32-soft
            cmake_args: >-
              -G Ninja
              -DCMAKE_BUILD_TYPE=Debug
              -DDOM_DISALLOW_DOWNLOADS=ON
              -DFETCHCONTENT_FULLY_DISCONNECTED=ON
              -DFETCHCONTENT_UPDATES_DISCONNECTED=ON
              -DDOM_PLATFORM=win32
              -DDOM_BACKEND_SOFT=ON
              -DDOM_BACKEND_NULL=OFF
              -DDOM_ENABLE_NET=ON
              -DDOM_BUILD_TESTS=ON
              -DDOM_BUILD_TOOLS=ON
            ctest_args: ""

          # Windows: null UI/gfx (headless).
          - os: windows-latest
            name: win32-null
            cmake_args: >-
              -G Ninja
              -DCMAKE_BUILD_TYPE=Debug
              -DDOM_DISALLOW_DOWNLOADS=ON
              -DFETCHCONTENT_FULLY_DISCONNECTED=ON
              -DFETCHCONTENT_UPDATES_DISCONNECTED=ON
              -DDOM_PLATFORM=null
              -DDOM_BACKEND_SOFT=OFF
              -DDOM_BACKEND_NULL=ON
              -DDOM_ENABLE_NET=ON
              -DDOM_BUILD_TESTS=ON
              -DDOM_BUILD_TOOLS=ON
            ctest_args: "-E domino_dui_smoke_native"

          # Linux: software renderer.
          - os: ubuntu-latest
            name: linux-soft
            cmake_args: >-
              -G Ninja
              -DCMAKE_BUILD_TYPE=Debug
              -DDOM_DISALLOW_DOWNLOADS=ON
              -DFETCHCONTENT_FULLY_DISCONNECTED=ON
              -DFETCHCONTENT_UPDATES_DISCONNECTED=ON
              -DDOM_PLATFORM=posix_headless
              -DDOM_BACKEND_SOFT=ON
              -DDOM_BACKEND_NULL=OFF
              -DDOM_ENABLE_NET=ON
              -DDOM_BUILD_TESTS=ON
              -DDOM_BUILD_TOOLS=ON
            ctest_args: ""

          # Linux: null renderer + offline build.
          - os: ubuntu-latest
            name: linux-null-offline
            cmake_args: >-
              -G Ninja
              -DCMAKE_BUILD_TYPE=Debug
              -DDOM_DISALLOW_DOWNLOADS=ON
              -DFETCHCONTENT_FULLY_DISCONNECTED=ON
              -DFETCHCONTENT_UPDATES_DISCONNECTED=ON
              -DDOM_PLATFORM=posix_headless
              -DDOM_BACKEND_SOFT=OFF
              -DDOM_BACKEND_NULL=ON
              -DDOM_ENABLE_NET=OFF
              -DDOM_BUILD_TESTS=ON
              -DDOM_BUILD_TOOLS=ON
            ctest_args: ""

          # macOS: headless build (no native UI required for CI).
          - os: macos-latest
            name: macos-soft
            cmake_args: >-
              -G Ninja
              -DCMAKE_BUILD_TYPE=Debug
              -DDOM_DISALLOW_DOWNLOADS=ON
              -DFETCHCONTENT_FULLY_DISCONNECTED=ON
              -DFETCHCONTENT_UPDATES_DISCONNECTED=ON
              -DDOM_PLATFORM=posix_headless
              -DDOM_BACKEND_SOFT=ON
              -DDOM_BACKEND_NULL=OFF
              -DDOM_ENABLE_NET=ON
              -DDOM_BUILD_TESTS=ON
              -DDOM_BUILD_TOOLS=ON
            ctest_args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Invariant checks (launcher core hardening)
        run: python setup/packages/scripts/ci/check_launcher_core_invariants.py

      - name: Layer checks (kernel boundaries)
        run: python setup/packages/scripts/check_layers.py

      - name: Configure
        run: cmake -S . -B build/${{ matrix.name }} ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build/${{ matrix.name }} --config Debug

      - name: Canonical tools PATH (adapter)
        shell: bash
        run: |
          set -euo pipefail
          if command -v python >/dev/null 2>&1; then
            PYTHON_BIN=python
          else
            PYTHON_BIN=python3
          fi
          TOOL_DIR="$($PYTHON_BIN scripts/dev/env_tools.py --repo-root . print-path)"
          echo "$TOOL_DIR" >> "$GITHUB_PATH"
          echo "DOM_TOOLS_PATH=$TOOL_DIR" >> "$GITHUB_ENV"

      - name: Tool resolution diagnostics
        shell: bash
        run: |
          set -euo pipefail
          if command -v python >/dev/null 2>&1; then
            PYTHON_BIN=python
          else
            PYTHON_BIN=python3
          fi
          "$PYTHON_BIN" - <<'PY'
          import shutil
          required = ("tool_ui_bind", "tool_ui_validate", "tool_ui_doc_annotate")
          for tool in required:
              path = shutil.which(tool) or shutil.which(tool + ".exe")
              if not path:
                  raise SystemExit("missing canonical tool on PATH: {}".format(tool))
              print("{}={}".format(tool, path.replace("\\\\", "/")))
          PY

      - name: Test
        run: python scripts/dev/run_testx.py --repo-root . --test-dir build/${{ matrix.name }} --output-on-failure --extra-args "${{ matrix.ctest_args }}"

      - name: Kernel smoke tests
        run: python scripts/dev/run_testx.py --repo-root . --test-dir build/${{ matrix.name }} --output-on-failure --include-regex "dominium_layer_checks|launcher_kernel_smoke|setup_kernel_smoke"

      - name: Launcher CLI smoke (ui/gfx matrix)
        run: python setup/packages/scripts/ci/launcher_cli_smoke_matrix.py --build-dir build/${{ matrix.name }}

      - name: Support bundle determinism (crash bundle generation)
        run: python setup/packages/scripts/ci/test_support_bundle_determinism.py --out-dir build/${{ matrix.name }}/ci_artifacts/support_bundle

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.name }}
          path: |
            build/${{ matrix.name }}/Testing
            build/${{ matrix.name }}/*.log
            build/${{ matrix.name }}/*.txt
            build/${{ matrix.name }}/ci_artifacts

  build-test-canary:
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: win32-dx9
            cmake_args: >-
              -G Ninja
              -DCMAKE_BUILD_TYPE=Debug
              -DDOM_DISALLOW_DOWNLOADS=ON
              -DFETCHCONTENT_FULLY_DISCONNECTED=ON
              -DFETCHCONTENT_UPDATES_DISCONNECTED=ON
              -DDOM_PLATFORM=win32
              -DDOM_BACKEND_SOFT=ON
              -DDOM_BACKEND_NULL=OFF
              -DDOM_BACKEND_DX9=ON
              -DDOM_ENABLE_NET=ON
              -DDOM_BUILD_TESTS=ON
              -DDOM_BUILD_TOOLS=ON
            ctest_args: ""
          - os: ubuntu-latest
            name: linux-clang
            cmake_args: >-
              -G Ninja
              -DCMAKE_BUILD_TYPE=Debug
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DDOM_DISALLOW_DOWNLOADS=ON
              -DFETCHCONTENT_FULLY_DISCONNECTED=ON
              -DFETCHCONTENT_UPDATES_DISCONNECTED=ON
              -DDOM_PLATFORM=posix_headless
              -DDOM_BACKEND_SOFT=ON
              -DDOM_BACKEND_NULL=OFF
              -DDOM_ENABLE_NET=ON
              -DDOM_BUILD_TESTS=ON
              -DDOM_BUILD_TOOLS=ON
            ctest_args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Invariant checks (launcher core hardening)
        run: python setup/packages/scripts/ci/check_launcher_core_invariants.py

      - name: Layer checks (kernel boundaries)
        run: python setup/packages/scripts/check_layers.py

      - name: Configure
        run: cmake -S . -B build/${{ matrix.name }} ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build/${{ matrix.name }} --config Debug

      - name: Canonical tools PATH (adapter)
        shell: bash
        run: |
          set -euo pipefail
          if command -v python >/dev/null 2>&1; then
            PYTHON_BIN=python
          else
            PYTHON_BIN=python3
          fi
          TOOL_DIR="$($PYTHON_BIN scripts/dev/env_tools.py --repo-root . print-path)"
          echo "$TOOL_DIR" >> "$GITHUB_PATH"
          echo "DOM_TOOLS_PATH=$TOOL_DIR" >> "$GITHUB_ENV"

      - name: Tool resolution diagnostics
        shell: bash
        run: |
          set -euo pipefail
          if command -v python >/dev/null 2>&1; then
            PYTHON_BIN=python
          else
            PYTHON_BIN=python3
          fi
          "$PYTHON_BIN" - <<'PY'
          import shutil
          required = ("tool_ui_bind", "tool_ui_validate", "tool_ui_doc_annotate")
          for tool in required:
              path = shutil.which(tool) or shutil.which(tool + ".exe")
              if not path:
                  raise SystemExit("missing canonical tool on PATH: {}".format(tool))
              print("{}={}".format(tool, path.replace("\\\\", "/")))
          PY

      - name: Test
        run: python scripts/dev/run_testx.py --repo-root . --test-dir build/${{ matrix.name }} --output-on-failure --extra-args "${{ matrix.ctest_args }}"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canary-${{ matrix.name }}
          path: |
            build/${{ matrix.name }}/Testing
            build/${{ matrix.name }}/*.log
            build/${{ matrix.name }}/*.txt
            build/${{ matrix.name }}/ci_artifacts

  reproducible-build:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reproducible build check (Release)
        run: python3 setup/packages/scripts/repro/verify_reproducible_builds.py --generator Ninja --build-type Release --define DOM_DISALLOW_DOWNLOADS=ON --define FETCHCONTENT_FULLY_DISCONNECTED=ON --define FETCHCONTENT_UPDATES_DISCONNECTED=ON

      - name: Upload repro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: repro-failure
          path: build/repro_compare

  portable-packages:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            cmake_args: >-
              -DDOM_PLATFORM=posix_headless
              -DDOM_BACKEND_SOFT=ON
              -DDOM_BACKEND_NULL=OFF
            target: dominium_portable_tgz
          - os: windows-latest
            name: windows
            cmake_args: >-
              -DDOM_PLATFORM=win32
              -DDOM_BACKEND_SOFT=ON
              -DDOM_BACKEND_NULL=OFF
            target: dominium_portable_zip
          - os: macos-latest
            name: macos
            cmake_args: >-
              -DDOM_PLATFORM=posix_headless
              -DDOM_BACKEND_SOFT=ON
              -DDOM_BACKEND_NULL=OFF
            target: dominium_portable_tgz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure (packaging)
        run: >
          cmake -S . -B build/pack-${{ matrix.name }}
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DDOMINIUM_ENABLE_PACKAGING=ON
          -DDOM_DISALLOW_DOWNLOADS=ON
          -DFETCHCONTENT_FULLY_DISCONNECTED=ON
          -DFETCHCONTENT_UPDATES_DISCONNECTED=ON
          ${{ matrix.cmake_args }}

      - name: Build portable package
        run: cmake --build build/pack-${{ matrix.name }} --target ${{ matrix.target }}

      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        run: cmake --build build/pack-${{ matrix.name }} --target dominium_macos_app

      - name: Upload portable packages
        uses: actions/upload-artifact@v4
        with:
          name: portable-packages-${{ matrix.name }}
          path: build/pack-${{ matrix.name }}/dist
