[contract]
id = "dominium.release.component_matrix.v1"
status = "provisional"
phase = "CONVERGE-11"
description = "Machine-readable component, product, platform, renderer, native app, toolchain, packaging, and runtime backend matrix."

[policy]
statuses = ["available", "implemented", "stub", "planned", "experimental", "provisional", "deprecated", "unsupported", "blocked", "research", "unknown"]
support_tiers = ["T0", "T1", "T2", "T3", "T4", "T5"]
unknown_defaults_to_unsupported = true
stub_is_not_support = true
planned_is_not_support = true
research_is_not_support = true
experimental_requires_label = true
matrices_are_planning_contracts_not_implementations = true
available_requires_evidence = true

[support_tiers.T0]
name = "correctness_baseline"
purpose = "Deterministic, headless, portable baseline for tests, replay, and minimal operation."

[support_tiers.T1]
name = "early_modern_desktop"
purpose = "Initial public-ish desktop coverage on modern Windows, macOS, and Linux."

[support_tiers.T2]
name = "broad_compatibility"
purpose = "Wider compatibility coverage including older desktop paths where feasible."

[support_tiers.T3]
name = "retro_research"
purpose = "Legacy/retro lanes requiring frozen toolchains and smoke tests."

[support_tiers.T4]
name = "advanced_modern"
purpose = "Advanced GPU/render/platform/toolchain work after baseline stability."

[support_tiers.T5]
name = "mobile_web_exotic"
purpose = "Mobile, web, exotic OS, console, and special-device research lanes."

[products.client]
role = "Rendered game client product."
preferred_modes = ["rendered", "tui", "cli"]
status = "provisional"
tier = "T1"
evidence = "apps/client exists with CLI/TUI/rendered/native-host source surfaces; rendered support remains matrix-governed."

[products.server]
role = "Authoritative/headless server product."
preferred_modes = ["headless", "tui", "cli"]
status = "provisional"
tier = "T0"
evidence = "apps/server exists with server entrypoint, console, network, and persistence surfaces."

[products.launcher]
role = "Install/profile/launch selection and preflight product."
preferred_modes = ["os_native", "tui", "cli"]
status = "provisional"
tier = "T1"
evidence = "apps/launcher exists with CLI, TUI stub, and Win32 GUI stub/source surfaces."

[products.setup]
role = "Install/update/repair/package setup product."
preferred_modes = ["os_native", "tui", "cli"]
status = "provisional"
tier = "T1"
evidence = "apps/setup exists with CLI, TUI stub, Win32 GUI stub/source, and packaging scripts."

[products.tools]
role = "Shipped tools where distinct from developer tools."
preferred_modes = ["cli", "tui", "os_native"]
status = "planned"
tier = "T2"
evidence = "Developer tooling exists under tools; shipped product tools require explicit classification before apps/tools."

[product_modes.cli]
status = "available"
tier = "T0"
description = "Command line interface."
evidence = "Product shell contract and AppShell mode policy make CLI canonical."

[product_modes.tui]
status = "stub"
tier = "T0"
description = "Text user interface or deterministic TUI stub."
evidence = "AppShell and product roots contain TUI stubs; full TUI parity is not claimed."

[product_modes.headless]
status = "available"
tier = "T0"
description = "No UI; server/CI/runtime mode."
evidence = "AppShell mode policy and server/headless CMake lanes define headless operation."

[product_modes.rendered]
status = "provisional"
tier = "T1"
description = "Rendered client UI."
evidence = "Client render/presentation surfaces exist; renderer backend support is status-tagged separately."

[product_modes.os_native]
status = "stub"
tier = "T1"
description = "OS-native/OEM+ setup/launcher/admin/tool shell."
evidence = "Setup, launcher, client, and server have Win32 GUI source/stub surfaces; no broad native GUI implementation is claimed."

[platform_backends.null]
status = "available"
tier = "T0"
purpose = "Null/headless platform backend."
evidence = "DOM_PLATFORM accepts null and maps it to a platform ID."

[platform_backends.posix_headless]
status = "available"
tier = "T0"
purpose = "POSIX headless/server/CI path."
evidence = "CMake defaults DOM_PLATFORM to posix_headless on UNIX hosts."

[platform_backends.win32]
status = "provisional"
tier = "T1"
purpose = "Windows native platform host."
evidence = "DOM_PLATFORM accepts win32; Windows presets and Win32 app shell source surfaces exist."

[platform_backends.win32_headless]
status = "provisional"
tier = "T0"
purpose = "Windows headless platform host."
evidence = "DOM_PLATFORM accepts win32_headless."

[platform_backends.cocoa]
status = "stub"
tier = "T1"
purpose = "macOS native platform host."
evidence = "DOM_PLATFORM accepts cocoa and macOS Xcode presets exist; current platform docs describe cocoa as headless-safe stub."

[platform_backends.posix_x11]
status = "stub"
tier = "T1"
purpose = "Linux X11 desktop host."
evidence = "DOM_PLATFORM accepts posix_x11 and Linux presets reference it; current platform docs describe X11 as headless-safe stub."

[platform_backends.posix_wayland]
status = "stub"
tier = "T1"
purpose = "Linux Wayland desktop host."
evidence = "DOM_PLATFORM accepts posix_wayland; current platform docs describe Wayland as headless-safe stub."

[platform_backends.sdl2]
status = "experimental"
tier = "T1"
purpose = "Convenience/dev portability adapter, not product identity."
evidence = "DOM_PLATFORM accepts sdl2 and DOM_BACKEND_SDL2/DOM_FETCH_SDL2 exist; dependency availability gates actual use."

[platform_backends.android]
status = "research"
tier = "T5"
purpose = "Deferred mobile platform lane."
evidence = "No current source implementation or build preset is treated as supported."

[render_backends.null]
status = "available"
tier = "T0"
purpose = "CI/server/headless renderer."
evidence = "DOM_BACKEND_NULL defaults ON and registers dom_render_backend_null; renderer docs call null a required correctness path."

[render_backends.soft]
status = "available"
tier = "T0"
purpose = "Software renderer baseline."
evidence = "DOM_BACKEND_SOFT defaults ON and registers dom_render_backend_soft; renderer docs call software a required correctness path."

[render_backends.gl1]
status = "research"
tier = "T3"
purpose = "Extreme legacy/fixed-function renderer."
evidence = "DOM_BACKEND_GL1 exists but defaults OFF; current docs classify GPU backends as soft-backed stubs until native implementations land."

[render_backends.gl2]
status = "stub"
tier = "T1"
purpose = "OpenGL compatibility renderer."
evidence = "DOM_BACKEND_GL2 exists and is Windows/WGL-gated; current docs classify GPU backends as soft-backed stubs."

[render_backends.gl4]
status = "stub"
tier = "T4"
purpose = "Modern OpenGL renderer."
evidence = "DOM_BACKEND_GL4 exists but defaults OFF; native implementation support is not claimed."

[render_backends.dx9]
status = "research"
tier = "T3"
purpose = "Legacy Windows renderer."
evidence = "DOM_BACKEND_DX9 exists and fallback presets reference DX9; current docs classify GPU backends as soft-backed stubs."

[render_backends.dx11]
status = "stub"
tier = "T1"
purpose = "First serious Windows hardware renderer."
evidence = "DOM_BACKEND_DX11 exists but defaults OFF; native implementation support is not claimed."

[render_backends.dx12]
status = "planned"
tier = "T4"
purpose = "Advanced Windows renderer."
evidence = "DOM_BACKEND_DX12 exists but defaults OFF; no implemented support is claimed."

[render_backends.vk1]
status = "planned"
tier = "T4"
purpose = "Modern Vulkan renderer."
evidence = "DOM_BACKEND_VK1 exists but defaults OFF; no implemented support is claimed."

[render_backends.metal]
status = "planned"
tier = "T4"
purpose = "Modern macOS native GPU renderer."
evidence = "DOM_BACKEND_METAL exists but defaults OFF; no implemented support is claimed."

[render_backends.vector2d]
status = "planned"
tier = "T2"
purpose = "2D/UI/vector acceleration for setup/launcher/tools/overlays."
evidence = "DOM_BACKEND_VECTOR2D exists but defaults OFF; CMakePresets reference it for selected lanes."

[native_shells.win32]
status = "stub"
products = ["setup", "launcher", "client", "server"]
tier = "T1"
evidence = "apps/*/gui contain Win32 source or stub files; product semantics remain outside native shells."

[native_shells.appkit]
status = "planned"
products = ["setup", "launcher", "tools"]
tier = "T1"
evidence = "macOS cocoa/AppKit lanes are documented, but no implemented native shell is claimed."

[native_shells.gtk]
status = "planned"
