schema_version = "dominium.transaction.policy.v1"
status = "provisional"
owner = "contracts.transaction"

[contract]
id = "dominium.transaction.policy.v1"
stability = "provisional"
purpose = "Defines deterministic transaction lifecycle, dry-run, evidence, refusal, commit, export, and rollback law."

[identity]
transaction_identity_is_commit_hash = false
transaction_identity_is_file_path = false
required_identity_field = "transaction_id"

[lifecycle]
statuses = ["proposed", "validated", "refused", "dry_run_passed", "dry_run_failed", "committed", "rolled_back", "superseded", "retired"]
commit_policies = ["dry_run_only", "manual_review_required", "auto_commit_allowed", "package_export_only", "evidence_only"]
dry_run_before_commit_required = true
committed_requires_evidence_packet_ref = true
refusal_requires_diagnostic_or_refusal_ref = true
rollback_unavailable_must_be_explicit = true

[outputs]
file_writes_are_transaction_outputs = true
release_pack_export_is_transaction_output = true
workbench_panel_state_is_truth = false
aide_codex_patch_is_hidden_mutation = false
