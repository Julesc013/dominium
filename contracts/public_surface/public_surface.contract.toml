schema_version = "dominium.public_surface.registry.v1"
status = "provisional"
last_reviewed = "2026-05-20"
owner = "contracts.public_surface"

[contract]
id = "dominium.public_surface.registry.v1"
status = "provisional"
owner = "contracts.public_surface"
purpose = "Registers public, internal, generated, fixture, historical, and retired surfaces."

[policy]
paths_are_identity = false
implementation_is_contract = false
generated_output_is_source_truth = false
ui_is_authority = false
default_stability = "internal"
stable_requires_proof = true
stable_requires_compatibility_policy = true
stable_requires_registry_update = true
generated_requires_source_and_generator = true
retired_requires_reason = true
full_ctest_required_for_registry_change = false
normal_gate = "fast_strict"

[stability_transition]
allowed = ["experimental->provisional", "provisional->stable_api", "provisional->stable_data_contract", "provisional->stable_command_contract", "provisional->stable_protocol", "stable_api->retired", "stable_data_contract->retired", "stable_command_contract->retired", "stable_protocol->retired", "internal->provisional", "generated->provisional", "fixture->provisional"]
forbidden = ["internal->stable_api", "internal->stable_data_contract", "generated->stable_data_contract_without_source_promotion", "fixture->stable_data_contract_without_new_surface", "historical->stable_without_review", "retired->stable_without_replacement_protocol"]
promotion_rule = "Stable promotion requires this registry update, proof entries, compatibility policy, and task-specific validation."
retirement_rule = "Retirement requires replacement_policy and retirement_reason."

