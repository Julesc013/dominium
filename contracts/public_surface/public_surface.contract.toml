path = "engine/include"
owner = "engine"
stability = "provisional"
language = "c89"
version = "0.1.0"
introduced = "PUBLIC-SURFACE-REGISTRY-01"
proof = ["python scripts/verify_includes_sanity.py --repo-root .", "python scripts/verify_abi_boundaries.py --repo-root ."]
