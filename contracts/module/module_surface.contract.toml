[contract]
id = "dominium.module.surface.v1"
status = "provisional"
owner = "contracts.module"
purpose = "Defines module identity, composition, and binding law."

[policy]
module_identity_is_path = false
workbench_is_authority = false
stable_modules_require_proof = true
modules_depend_on_private_paths = false
pack_modules_require_declared_descriptor = true
runtime_loader_implemented = false
replacement_protocol_required_for_stable_replacement = true
module_declarations_live_in_contracts_or_pack_manifests = true
workbench_modules_are_presentation_only = true
reusable_behavior_lives_under_ownership_root = true
module_payloads_are_pack_delivered = true
top_level_modules_root_allowed = false
top_level_plugins_root_allowed = false
top_level_services_root_allowed = false
top_level_workspaces_root_allowed = false
runtime_module_root_is_service_only = true
content_modules_root_allowed = false
apps_compose_modules_do_not_own_reusable_behavior = true

[[module]]
module_id = "dominium.workbench.validation"
module_kind = "workbench_module"
owner = "apps.workbench"
version = "0.1.0"
stability = "provisional"
implementation_status = "skeletal_headless"
implementation_path = "apps/workbench/module/validation"
implementation_path_is_identity = false
ownership_layer = "workbench_presentation"
implementation_roots = ["apps/workbench/module"]
payload_roots = []
composition_roots = ["apps/workbench/workspace"]
forbidden_roots = ["modules", "content/modules"]
presentation_only = true
reusable_behavior = false
provided_surfaces = ["dominium.module.descriptor.v1"]
required_surfaces = ["dominium.command.surface.v1", "dominium.diagnostics.registry.v1", "dominium.view.surface.v1", "dominium.action.surface.v1", "dominium.presentation.projection_kind.v1"]
required_services = ["service.command", "service.validation", "service.diagnostics"]
required_commands = ["dominium.validation.run"]
required_capabilities = ["dominium.workbench.module.validation"]
required_providers = ["dominium.provider.workbench.validation"]
documents = ["document.validation_result"]
views = ["view.table", "view.inspector", "dominium.validation.summary.v1"]
actions = ["dominium.validation.open_report.v1", "dominium.validation.export_evidence.v1", "dominium.validation.rerun.v1"]
events = ["event.validation.progress"]
refusals = ["dominium.refusal.validation.target_unknown", "dominium.refusal.validation.target_kind_unsupported", "dominium.refusal.validation.target_outside_allowed_root", "dominium.refusal.command.capability_missing"]
diagnostics = ["DOM-PUBLIC-SURFACE-INVALID", "DOM-MODULE-MISSING-REQUIRED-COMMAND", "DOM-VALIDATION-TARGET-UNKNOWN", "DOM-VALIDATION-TARGET-KIND-UNSUPPORTED", "DOM-VALIDATION-TARGET-OUTSIDE-ROOT", "DOM-VALIDATION-RUN-REFUSED", "DOM-VALIDATION-RUN-WARNING"]
artifacts = ["evidence_packet"]
packs = []
tests = ["py -3 tests/apps/workbench_validation_slice_tests.py", "py -3 tests/apps/workbench_validation_view_tests.py"]
proof = ["py -3 tests/apps/workbench_validation_slice_tests.py", "py -3 tests/apps/workbench_validation_view_tests.py", "py -3 tools/validators/contracts/check_command_result_view.py --repo-root . --strict"]
replacement_policy = "requires_module_surface_update"
compatibility_policy = "not_yet_stable"
notes = "Headless skeletal Workbench validation module implemented by WORKBENCH-VALIDATION-SLICE-01 and extended by COMMAND-RESULT-VIEW-SLICE-01; it validates the registered contract-schema artifact through dominium.validation.run and projects a semantic validation summary view without implementing Workbench shell, rendered UI, native GUI, or workspace runtime."
