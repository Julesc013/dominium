schema_version = "dominium.versioning.policy.v1"
status = "provisional"
owner = "contracts.versioning"

[contract]
id = "dominium.versioning.removal_policy.v1"
version = "1.0.0"
stability = "provisional"
purpose = "Defines removal as a governed lifecycle state after obligations are migrated, bridged, or refused."

[policy]
delete_is_not_policy = true
stable_to_removed_directly_forbidden = true
removed_requires_retirement_history_or_explicit_reviewed_policy = true
removed_requires_refusal_or_compatibility_bridge = true
public_removal_requires_evidence = true
artifact_references_require_migration_or_refusal = true
schema_protocol_removal_requires_version_policy = true
command_removal_requires_command_surface_update = true
provider_module_app_removal_requires_descriptor_policy = true

[non_goals]
runtime_removal_dispatch = false
release_promotion_gate = false
active_surface_removal = false

[proof]
validator = "tools/validators/contracts/check_version_deprecation.py"
fixtures = "tests/contract/versioning"
