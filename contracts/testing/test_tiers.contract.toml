schema_version = "dominium.test_tiers.v1"
status = "active"
last_reviewed = "2026-05-20"
owner = "validation_audit"
default_gate = "fast_strict"
foundation_lock_task = "FAST-STRICT-TEST-TIER-01"

[contract]
id = "dominium.testing.test_tiers.v1"
status = "provisional"
owner = "tools.test"
purpose = "Defines normal, extended, release, and full proof tiers."

[policy]
normal_development_gate = "fast_strict"
extended_gate = "extended"
release_gate = "release"
release_candidate_alias = "release_candidate"
full_certification_gate = "full"
feature_work_before_foundation_closeout = "bounded_foundation_only"
full_ctest_normal_gate = false
known_debt_follow_up = "FULL-GATE-DEBT-01"
known_debt_policy = "Known full-gate debt must remain visible and must not be converted into pass, warning, deletion, or silent skip."
allowed_warning_policy = "Warnings are allowed only when the command is explicitly optional or the contract says the finding is advisory evidence."
promotion_rules = [
  "fast_strict is required for ordinary Foundation Lock work.",
  "extended is task-dependent and adds T3 product/projection proof when relevant.",
  "release is required before release, projection, product, trust, or compatibility promotion.",
  "release_candidate is a compatibility alias for the release gate.",
  "full is required for full certification and broad replacement or trust-bearing work.",
  "A green fast_strict gate does not claim full CTest or full release proof is green.",
]

[gates.fast_strict]
name = "Fast Strict Development Gate"
purpose = "Normal development proof loop for bounded feature, refactor, and Foundation Lock work."
tiers = ["T0", "T1", "T2"]
target_seconds = 600
default_command = "python tools/test/run_fast_strict.py --repo-root ."
failure_policy = "Any required T0, T1, or T2 failure fails the gate. Optional warnings remain visible."
evidence_outputs = [
  ".aide/reports/FAST-STRICT-TEST-TIER-01-run.json",
  ".aide/reports/FAST-STRICT-TEST-TIER-01-run.md",
]

[gates.release_candidate]
name = "Release Candidate Proof Gate Alias"
purpose = "Compatibility alias for the release proof gate."
tiers = ["T0", "T1", "T2", "T3", "T4"]
target_seconds = 3600
default_command = "python tools/test/run_fast_strict.py --repo-root . --gate release_candidate"
failure_policy = "Required release_candidate commands must pass. Selected T4 commands are explicit and do not imply full certification."
evidence_outputs = [
  ".aide/reports/latest-release-candidate-result.json",
  ".aide/reports/latest-release-candidate-result.md",
]

[gates.extended]
name = "Task-Dependent Extended Proof Gate"
purpose = "Normal proof plus relevant T3 product/projection confidence checks when the task touches those surfaces."
tiers = ["T0", "T1", "T2", "T3"]
target_seconds = 1500
default_command = "python tools/test/run_fast_strict.py --repo-root . --gate extended"
failure_policy = "Required T0-T3 commands selected for the task must pass. T3 is not part of ordinary edit-loop work."
evidence_outputs = [
  ".aide/reports/latest-extended-proof-result.json",
  ".aide/reports/latest-extended-proof-result.md",
]

[gates.release]
name = "Release Proof Gate"
purpose = "Release/projection/product proof with selected T4 trust checks."
tiers = ["T0", "T1", "T2", "T3", "T4"]
target_seconds = 3600
default_command = "python tools/test/run_fast_strict.py --repo-root . --gate release"
failure_policy = "Required release commands must pass. Selected T4 commands are explicit and do not imply full certification."
evidence_outputs = [
  ".aide/reports/latest-release-proof-result.json",
  ".aide/reports/latest-release-proof-result.md",
]

[gates.full]
name = "Full Certification Proof Gate"
purpose = "Full release/trust/certification proof. This is not the normal development gate."
tiers = ["T0", "T1", "T2", "T3", "T4"]
target_seconds = 7200
default_command = "python tools/test/run_fast_strict.py --repo-root . --gate full"
failure_policy = "All required available full commands must pass. Current full CTest debt remains blocking until remediated."
evidence_outputs = [
  ".aide/reports/latest-full-proof-result.json",
  ".aide/reports/latest-full-proof-result.md",
]

[tiers.T0]
name = "Static Format and Repo Hygiene"
purpose = "Catch malformed files, accidental generated output staging, and obvious root hygiene violations quickly."
owner = "repo_hygiene"
normal_gate_member = true
release_gate_member = true
full_gate_member = true
timeout_guidance = "Target under 2 minutes."
failure_policy = "Required T0 failures fail every gate."
known_debt_policy = "No known debt is accepted for required T0 checks."
promotion_rule = "T0 must pass before T1/T2 evidence can promote a normal task."

[tiers.T1]
name = "Strict Repo and Contract Hygiene"
purpose = "Prove the repository remains inside the canonical ownership, layout, contract, and AIDE spine."
owner = "repo_contract_hygiene"
normal_gate_member = true
release_gate_member = true
full_gate_member = true
timeout_guidance = "Target under 5 minutes; RepoX STRICT may dominate runtime."
failure_policy = "Required T1 failures fail the gate. Optional naming-debt classifiers may warn only when marked optional."
known_debt_policy = "Current optional naming classifiers are advisory; strict layout/root/distribution/component and RepoX checks remain required."
promotion_rule = "T1 must pass for ordinary Foundation Lock work."

[tiers.T2]
name = "Build and Smoke Proof"
purpose = "Prove the verify preset configures, the build-only verify target runs, and short CTest smoke passes."
owner = "build_smoke"
normal_gate_member = true
release_gate_member = true
full_gate_member = true
timeout_guidance = "Target under 10 minutes together with T0/T1 where possible."
failure_policy = "Required T2 failures fail fast_strict."
known_debt_policy = "Full CTest, public-header consumer, and broad focused portability debt are not part of T2; smoke must not be weakened."
promotion_rule = "T2 completes the normal fast_strict development gate."

[tiers.T3]
name = "Product and Projection Proof"
purpose = "Prove product command surfaces, portable projection, and internal pilot release evidence when release/projection work is in scope."
owner = "product_projection"
normal_gate_member = false
release_gate_member = true
full_gate_member = true
timeout_guidance = "Release/projection lane; not part of normal fast_strict."
failure_policy = "Required T3 failures block release_candidate and full gates."
known_debt_policy = "Missing local projection or release roots are release blockers, not normal-gate blockers."
promotion_rule = "T3 is required before release/projection promotion."

[tiers.T4]
name = "Full, Release, and Trust Proof"
purpose = "Full confidence lane for full CTest, compatibility, trust, replay, migration, provider, portability, and release certification."
owner = "release_trust"
normal_gate_member = false
release_gate_member = true
full_gate_member = true
timeout_guidance = "Slow lane. Full CTest may exceed normal development budgets."
failure_policy = "Required T4 failures block full certification. Selected T4 failures block release_candidate when selected."
known_debt_policy = "Full CTest and broad release/trust debt must remain visible and tracked under FULL-GATE-DEBT-01."
promotion_rule = "T4 is required for full certification and selected release/trust promotions."

