attic = { classification = "transitional_archive_root", target_or_review = "archive/historical", retire_by_phase = "CONVERGE-05", notes = "Historical material should converge under archive." }
legacy = { classification = "transitional_archive_root", target_or_review = "archive/legacy", retire_by_phase = "CONVERGE-05", notes = "Legacy material should converge under archive." }
quarantine = { classification = "transitional_archive_root", target_or_review = "archive/quarantine", retire_by_phase = "CONVERGE-05", notes = "Quarantined material should remain visible and provenance-preserved." }
dist = { classification = "generated_or_release_output", target_or_review = "generated output unless explicit exception", retire_by_phase = "review", notes = "Distribution output root; source authority lives in release/contracts." }
artifacts = { classification = "generated_or_ephemeral", target_or_review = "generated evidence or release review", retire_by_phase = "review", notes = "Generated or release-adjacent artifacts require provenance review." }
build = { classification = "generated_or_ephemeral", target_or_review = "generated build output", retire_by_phase = "review", notes = "Generated build output; not source authority." }
out = { classification = "generated_or_ephemeral", target_or_review = "generated build output", retire_by_phase = "review", notes = "Generated build output; not source authority." }
governance = { classification = "transitional_docs_root", target_or_review = "docs/governance", retire_by_phase = "CONVERGE-02", notes = "Governance mirrors must not compete with AGENTS.md." }
