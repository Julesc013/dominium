attic = { classification = "retired_archive_root", target_or_review = "archive/historical/attic", retire_by_phase = "CONVERGE-05", retired = true, completed_phase = "CONVERGE-05", status_after_phase = "violation", notes = "Root-level attic/ was retired in CONVERGE-05; retained material belongs under archive/historical/attic/." }
legacy = { classification = "retired_archive_root", target_or_review = "archive/legacy", retire_by_phase = "CONVERGE-05", retired = true, completed_phase = "CONVERGE-05", status_after_phase = "violation", notes = "Root-level legacy/ was retired in CONVERGE-05; retained material belongs under archive/legacy/." }
quarantine = { classification = "retired_archive_root", target_or_review = "archive/quarantine", retire_by_phase = "CONVERGE-05", retired = true, completed_phase = "CONVERGE-05", status_after_phase = "violation", notes = "Root-level quarantine/ was retired in CONVERGE-05; retained material belongs under archive/quarantine/." }
