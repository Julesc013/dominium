[contract]
id = "dominium.repo.root_allowlist.v1"
status = "provisional"
enforcement = "audit"
phase = "CONVERGE-02"
description = "Root-level allowlist contract for non-blocking repository convergence audit."

[policy]
default_for_unknown_root = "violation"
audit_exits_zero = true
strict_fails_unknown_root = true
strict_fails_forbidden_root = true
strict_fails_missing_expected_root = false
source_repo_layout_is_not_runtime_layout = true

[canonical_directories]
apps = { required = false, notes = "Target product entrypoint root; may not exist until convergence moves." }
engine = { required = true, notes = "Deterministic engine substrate." }
game = { required = true, notes = "Dominium game/rules/domain layer." }
runtime = { required = false, notes = "Target AppShell/platform/render/runtime root." }
contracts = { required = true, notes = "Machine-readable contracts, schemas, registries, capabilities, compatibility, replay, repo/distribution contracts." }
content = { required = false, notes = "Target packs, profiles, fixtures, datasets, assets." }
docs = { required = true, notes = "Human documentation." }
tests = { required = false, notes = "Test roots; may be split with module-local tests during migration." }
tools = { required = true, notes = "Developer tooling, validators, migration, CI, review." }
scripts = { required = true, notes = "Automation entrypoints." }
cmake = { required = true, notes = "CMake modules." }
external = { required = false, notes = "Vendored/external dependencies." }
release = { required = false, notes = "Release definitions, recipes, matrices, signing metadata." }
archive = { required = false, notes = "Historical/superseded/quarantined material." }

[optional_directories]
sdk = { notes = "Only for real external SDK surfaces; avoid as internal junk drawer." }
examples = { notes = "Only for explicit example/samples surface." }

[metadata_directories]
".github" = { notes = "GitHub workflows and repository automation." }
".vscode" = { notes = "Editor configuration." }
".aide" = { notes = "AIDE local/project governance if present." }
".codex" = { notes = "Codex local/project configuration if present." }
".aide.local.example" = { notes = "AIDE local-state example if present." }

[allowed_root_files]
allowed = [".agentignore", ".gitattributes", ".gitignore", "AGENTS.md", "CHANGELOG.md", "CLAUDE.md", "CMakeLists.txt", "CMakePresets.json", "CODE_CHANGE_JUSTIFICATION.md", "CONTRIBUTING.md", "DOMINIUM.md", "GOVERNANCE.md", "LICENSE", "LICENSE.md", "MODDING.md", "README.md", "SECURITY.md", "sitecustomize.py", "VERSION_CLIENT", "VERSION_ENGINE", "VERSION_GAME", "VERSION_LAUNCHER", "VERSION_SERVER", "VERSION_SETUP", "VERSION_SUITE", "VERSION_TOOLS"]
patterns = ["VERSION_*"]

[transitional_directories]
app = { classification = "transitional_runtime_root", target_or_review = "runtime/app", retire_by_phase = "CONVERGE-07", notes = "Current runtime/app substrate; split only after boundary review." }
appshell = { classification = "transitional_runtime_root", target_or_review = "runtime/appshell", retire_by_phase = "CONVERGE-07", notes = "Current AppShell root; final home is runtime/appshell after review." }
client = { classification = "transitional_product_root", target_or_review = "apps/client", retire_by_phase = "CONVERGE-08", notes = "Current product root; final app root should be apps/client." }
server = { classification = "transitional_product_root", target_or_review = "apps/server", retire_by_phase = "CONVERGE-08", notes = "Current product root; final app root should be apps/server." }
setup = { classification = "transitional_product_root", target_or_review = "apps/setup", retire_by_phase = "CONVERGE-08", notes = "Current product root; final app root should be apps/setup." }
launcher = { classification = "transitional_product_root", target_or_review = "apps/launcher", retire_by_phase = "CONVERGE-08", notes = "Current product root; final app root should be apps/launcher." }
schema = { classification = "transitional_alias", target_or_review = "contracts/schemas", retire_by_phase = "CONVERGE-06", notes = "Legacy/current schema law root; preserve semantic authority during convergence." }
schemas = { classification = "transitional_alias", target_or_review = "contracts/schemas", retire_by_phase = "CONVERGE-06", notes = "Validator-facing schema projection; do not silently replace schema law." }
lib = { classification = "transitional_alias", target_or_review = "review", retire_by_phase = "CONVERGE-06", notes = "Classify by ownership before moving." }
libs = { classification = "transitional_alias", target_or_review = "review", retire_by_phase = "CONVERGE-06", notes = "Classify by ownership before moving." }
repo = { classification = "transitional_control_plane_root", target_or_review = "contracts/repo or docs/repo or tools/migration", retire_by_phase = "CONVERGE-06", notes = "Existing root-level repo is transitional; do not add new authority here." }
data = { classification = "transitional_mixed_data_root", target_or_review = "content/contracts/docs/tools split", retire_by_phase = "CONVERGE-09", notes = "Mixed registries, content, planning mirrors, and evidence." }
packs = { classification = "transitional_content_root", target_or_review = "content/packs", retire_by_phase = "CONVERGE-09", notes = "Current runtime pack substrate; pack ownership remains review-sensitive." }
profiles = { classification = "transitional_content_root", target_or_review = "content/profiles", retire_by_phase = "CONVERGE-09", notes = "Profile data should converge under content if not runtime state." }
bundles = { classification = "transitional_content_or_export_root", target_or_review = "content or generated exports review", retire_by_phase = "CONVERGE-09", notes = "Authored bundles and generated exports require split review." }
updates = { classification = "transitional_release_root", target_or_review = "release or ops review", retire_by_phase = "CONVERGE-06", notes = "Update metadata belongs to release/control-plane ownership after review." }
locks = { classification = "transitional_contract_root", target_or_review = "contracts/replay or runtime/locks or ops/transactions", retire_by_phase = "CONVERGE-06", notes = "Split deterministic locks, runtime locks, and ops transactions." }
compat = { classification = "transitional_contract_root", target_or_review = "contracts/compatibility plus runtime adapters", retire_by_phase = "CONVERGE-06", notes = "Split compatibility law from runtime adapters." }
core = { classification = "transitional_runtime_root", target_or_review = "runtime/core or game domain review", retire_by_phase = "CONVERGE-07", notes = "Likely mixed; do not move wholesale." }
field = { classification = "split_required_domain_root", target_or_review = "contracts/game/content/docs/tests split", retire_by_phase = "CONVERGE-09", notes = "Compatibility facade; field ownership must respect fields review." }
fields = { classification = "split_required_domain_root", target_or_review = "contracts/game/content/docs/tests split", retire_by_phase = "CONVERGE-09", notes = "Canonical semantic field substrate; split by ownership." }
process = { classification = "split_required_domain_root", target_or_review = "contracts/game/content/docs/tests split", retire_by_phase = "CONVERGE-09", notes = "Process domain is ownership-sensitive because mutation must stay lawful." }
ui = { classification = "transitional_runtime_root", target_or_review = "runtime/ui", retire_by_phase = "CONVERGE-07", notes = "UI is presentation/adaptation only." }
diag = { classification = "transitional_runtime_root", target_or_review = "runtime/diagnostics", retire_by_phase = "CONVERGE-07", notes = "Diagnostic runtime substrate." }
control = { classification = "transitional_runtime_root", target_or_review = "runtime/control plus contracts review", retire_by_phase = "CONVERGE-07", notes = "Control surfaces must preserve process-only mutation." }
net = { classification = "transitional_runtime_root", target_or_review = "runtime/network", retire_by_phase = "CONVERGE-07", notes = "Network adapters require authority boundary review." }
astro = { classification = "split_required_domain_root", target_or_review = "contracts/game/content/docs/tests split", retire_by_phase = "CONVERGE-09", notes = "Domain root must be split, not moved wholesale." }
