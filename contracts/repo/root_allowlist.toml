labs = { classification = "transitional_review_root", target_or_review = "review", retire_by_phase = "CONVERGE-03", notes = "Experimental material requires review before binding." }
meta = { classification = "transitional_review_root", target_or_review = "review", retire_by_phase = "CONVERGE-03", notes = "Meta surfaces require ownership review." }
modding = { classification = "transitional_content_root", target_or_review = "content/modding plus contracts/docs split", retire_by_phase = "CONVERGE-09", notes = "Modding may include content, contracts, and docs." }
models = { classification = "transitional_content_root", target_or_review = "content/models", retire_by_phase = "CONVERGE-09", notes = "Model data requires generated/runtime distinction." }
performance = { classification = "transitional_tooling_root", target_or_review = "tools/performance", retire_by_phase = "CONVERGE-03", notes = "Performance tooling/evidence should stay tool/evidence scoped." }
safety = { classification = "transitional_contract_root", target_or_review = "contracts/safety or docs/safety", retire_by_phase = "CONVERGE-06", notes = "Safety policy belongs under contracts or docs depending on authority." }
security = { classification = "transitional_contract_root", target_or_review = "contracts/security or docs/security", retire_by_phase = "CONVERGE-06", notes = "Security and trust surfaces are protected and review-sensitive." }
specs = { classification = "transitional_contract_root", target_or_review = "contracts/specs", retire_by_phase = "CONVERGE-06", notes = "Normative specs must retain authority during convergence." }
templates = { classification = "transitional_content_root", target_or_review = "content/templates", retire_by_phase = "CONVERGE-09", notes = "Templates may be authored content, contract inputs, or generated inputs." }
validation = { classification = "transitional_tooling_root", target_or_review = "tools/validation", retire_by_phase = "CONVERGE-03", notes = "Validation tooling belongs under tools unless it is contract law." }

[forbidden_root_patterns]
patterns = ["new_domain_root", "new_product_root_outside_apps", "new_schema_root_outside_contracts", "new_runtime_adapter_root_outside_runtime", "generated_output_without_exception"]
