safety = { classification = "transitional_contract_root", target_or_review = "contracts/safety or docs/safety", retire_by_phase = "CONVERGE-06", notes = "Safety policy belongs under contracts or docs depending on authority." }
security = { classification = "transitional_contract_root", target_or_review = "contracts/security or docs/security", retire_by_phase = "CONVERGE-06", notes = "Security and trust surfaces are protected and review-sensitive." }
