app = { classification = "retired_runtime_root", target_or_review = "runtime/app", retire_by_phase = "CONVERGE-07", retired = true, completed_phase = "CONVERGE-07", status_after_phase = "violation", notes = "Root-level app/ was retired in CONVERGE-07; retained app runtime substrate belongs under runtime/shell/lifecycle/." }
appshell = { classification = "retired_runtime_root", target_or_review = "runtime/appshell", retire_by_phase = "CONVERGE-07", retired = true, completed_phase = "CONVERGE-07", status_after_phase = "violation", notes = "Root-level appshell/ was retired in CONVERGE-07; AppShell source belongs under runtime/shell/." }
client = { classification = "retired_product_root", target_or_review = "apps/client", retire_by_phase = "CONVERGE-08", retired = true, completed_phase = "CONVERGE-08", status_after_phase = "violation", notes = "Root-level client/ was retired in CONVERGE-08; thin client entrypoint source belongs under apps/client/." }
server = { classification = "retired_product_root", target_or_review = "apps/server", retire_by_phase = "CONVERGE-08", retired = true, completed_phase = "CONVERGE-08", status_after_phase = "violation", notes = "Root-level server/ was retired in CONVERGE-08; thin server entrypoint source belongs under apps/server/." }
