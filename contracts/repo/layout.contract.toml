[contract]
id = "dominium.repo.layout.v1"
status = "provisional"
enforcement = "audit"
phase = "CONVERGE-01"
description = "Machine-readable repository layout contract for non-blocking convergence audit."

[policy]
default_for_unknown_root = "violation"
strict_fails_unknown_root = true
strict_fails_forbidden_root = true
strict_fails_missing_required_root = true
strict_fails_stale_alias_after_phase = "CONVERGE-10"
generated_outputs_tracked = false
source_repo_layout_is_not_runtime_layout = true

[canonical_roots.apps]
purpose = "Thin product entrypoints and product composition surfaces."
required = true
category = "product_entrypoints"
may_contain = ["client", "server", "setup", "launcher", "tools"]
must_not_contain = ["engine internals", "game domain truth", "generated package bytes"]

[canonical_roots.engine]
purpose = "Deterministic Domino substrate and public engine contracts."
required = true
category = "engine"
may_contain = ["deterministic mechanisms", "engine headers", "engine tests"]
must_not_contain = ["product behavior", "OS GUI ownership", "mutable runtime store"]

[canonical_roots.game]
purpose = "Dominium rules, domain process semantics, and authoritative game meaning."
required = true
category = "game"
may_contain = ["rules", "domain implementations", "world logic", "economy logic", "civilization logic"]
must_not_contain = ["platform adapters", "release package bytes", "tool-only code"]

[canonical_roots.runtime]
purpose = "Runtime host, AppShell, platform, render, input, audio, network, storage, diagnostics, and UI adapters."
required = true
category = "runtime_platform"
may_contain = ["appshell", "platform adapters", "render adapters", "input", "audio", "network", "storage", "diagnostics", "ui adapters"]
must_not_contain = ["simulation truth ownership", "domain law", "product identity"]

[canonical_roots.contracts]
purpose = "Machine-readable and prose contracts for schemas, registries, protocols, compatibility, stability, replay, ABI, repository, and distribution rules."
required = true
category = "contracts"
may_contain = ["abi", "schemas", "registries", "protocols", "capabilities", "compatibility", "stability", "replay", "repo", "distribution", "packs", "install", "instances", "saves", "bundles", "locks"]
must_not_contain = ["generated package bytes", "runtime mutable state", "product entrypoints"]

[canonical_roots.content]
purpose = "Authored packs, profiles, fixtures, datasets, assets, and domain data."
required = true
category = "content"
may_contain = ["packs", "profiles", "fixtures", "datasets", "assets", "domain-data"]
must_not_contain = ["generated dist output", "mutable runtime store", "product behavior"]

[canonical_roots.docs]
purpose = "Human-readable doctrine, guides, audits, and explanatory material."
required = true
category = "documentation"
may_contain = ["canon", "architecture", "planning", "repo", "release", "domains", "guides", "audits"]
must_not_contain = ["source code ownership", "generated package bytes"]

[canonical_roots.tests]
purpose = "Test suites, determinism checks, fixtures, and verification evidence inputs."
required = true
category = "validation"
may_contain = ["unit tests", "integration tests", "determinism tests", "fixtures"]
must_not_contain = ["runtime product code", "release package bytes"]

[canonical_roots.tools]
purpose = "Developer, validation, migration, CI, code generation, review, and audit tools."
required = true
category = "tools"
may_contain = ["validators", "migration", "ci", "codegen", "review", "audit"]
must_not_contain = ["runtime dependencies from product code", "simulation truth ownership"]

[canonical_roots.scripts]
purpose = "Developer workflow scripts and repository automation entrypoints."
required = true
category = "tools"
may_contain = ["developer scripts", "verification launchers", "automation helpers"]
must_not_contain = ["runtime product logic", "generated package bytes"]

[canonical_roots.cmake]
purpose = "CMake modules and build configuration helpers."
required = true
category = "build_configuration"
may_contain = ["cmake modules", "toolchain helpers", "build projections"]
must_not_contain = ["source domain ownership", "generated build output"]

[canonical_roots.external]
purpose = "Pinned third-party source or vendored external dependencies."
required = true
category = "external_dependencies"
may_contain = ["vendored dependencies", "third-party source", "dependency manifests"]
must_not_contain = ["Dominium-owned source", "generated build output"]

[canonical_roots.release]
purpose = "Release definitions, package recipes, matrices, signing metadata, and release policy inputs."
required = true
category = "release_control_plane"
may_contain = ["release policy", "package recipes", "matrices", "signing metadata", "publication metadata"]
must_not_contain = ["generated package bytes", "mutable install state"]

[canonical_roots.archive]
purpose = "Historical, superseded, quarantined, generated-evidence, and legacy material retained with provenance."
required = true
category = "archive"
may_contain = ["historical", "legacy", "quarantine", "superseded", "generated"]
must_not_contain = ["new canonical source ownership", "active product entrypoints"]

[optional_roots.sdk]
purpose = "Future public SDK headers, samples, and packaging surfaces."
required = false
category = "optional_sdk"
may_contain = ["public headers", "samples", "sdk docs"]
must_not_contain = ["private engine internals", "generated package bytes"]

[optional_roots.examples]
purpose = "Future examples and sample projects."
required = false
category = "optional_examples"
may_contain = ["examples", "sample projects"]
must_not_contain = ["canonical runtime truth", "release package bytes"]

[metadata_roots]
allowed = [".github", ".vscode", ".aide", ".aide.local.example"]

[allowed_root_files]
allowed = [".agentignore", ".gitattributes", ".gitignore", "AGENTS.md", "CLAUDE.md", "CMakeLists.txt", "CMakePresets.json", "CHANGELOG.md", "CODE_CHANGE_JUSTIFICATION.md", "CONTRIBUTING.md", "DOMINIUM.md", "GOVERNANCE.md", "LICENSE.md", "MODDING.md", "README.md", "SECURITY.md", "sitecustomize.py", "VERSION_CLIENT", "VERSION_ENGINE", "VERSION_GAME", "VERSION_LAUNCHER", "VERSION_SERVER", "VERSION_SETUP", "VERSION_SUITE", "VERSION_TOOLS"]
patterns = ["VERSION_*"]

