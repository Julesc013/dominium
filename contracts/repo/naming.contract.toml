forbidden = ["runtime_product_dependency_from_engine_game_runtime"]

[language.scripts]
allowed = ["python_wrappers", "powershell_wrappers", "bash_wrappers", "cmd_wrappers"]
forbidden = ["product_behavior", "simulation_truth"]

[language.cmake]
