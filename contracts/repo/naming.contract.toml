[language.engine]
allowed = ["c89", "headers"]
forbidden = ["python_runtime_behavior", "shell_runtime_behavior", "modern_cpp_without_exception"]
notes = "Engine is Domino, the deterministic universe simulation core. Public headers must remain C89 and C++98 parseable."

[language.game]
allowed = ["c89", "cpp98"]
forbidden = ["python_runtime_behavior_without_review", "modern_cpp_without_exception", "platform_adapter_ownership"]
notes = "Game owns Dominium gameplay meaning and law. Existing Python domain implementation remains transitional debt until a reviewed conversion or isolation task."

[language.runtime]
allowed = ["c89", "cpp98", "platform_adapter_language_when_isolated"]
forbidden = ["game_truth", "domain_law", "process_authority"]
notes = "Runtime hosts, adapts, presents, connects, stores, and diagnoses. It must not own simulation truth."

[language.apps]
allowed = ["cpp98", "c89", "product_specific_thin_shell_language_when_isolated"]
forbidden = ["simulation_truth", "domain_law", "runtime_adapter_ownership"]

[language.contracts]
allowed = ["json", "toml", "yaml", "schema", "manifest", "registry", "policy", "matrix", "lock"]
forbidden = ["runtime_executable_code", "truth_mutation"]

[language.content]
allowed = ["data", "assets", "packs", "profiles", "templates", "themes", "locale"]
forbidden = ["executable_code", "truth_mutation", "untrusted_pack_code"]

[language.tools]
