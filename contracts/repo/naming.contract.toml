[file_naming]
default_case = "lower_snake_case"
role_suffixes = ["schema.json", "registry.json", "manifest.json", "contract.toml", "policy.toml", "matrix.toml", "lock.json", "proof.json", "report.md", "report.json", "audit.md", "audit.json"]
