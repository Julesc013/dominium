  "research",
  "v2",
  "v3",
  "compat"
]
rule = "Forbidden terms must not become top-level source ownership roots. Nested use is warning-only until an owner review proves the term names real ownership."

[allowed_term_exceptions]
"archive/legacy" = "historical classification under the archive root"
"contracts/compatibility" = "compatibility contract ownership"
"docs/compatibility" = "compatibility documentation ownership"

