[contract]
id = "dominium.repo.layout_exceptions.v1"
status = "provisional"
phase = "CONVERGE-10"
description = "Explicit exception ledger for bounded repository layout enforcement exceptions."

[policy]
exceptions_are_temporary = true
exceptions_require_reason = true
exceptions_require_owner = false
exceptions_require_retirement_phase = true
exceptions_fail_if_path_missing = false
exceptions_fail_if_expired = true
unknown_roots_without_exception_fail_strict = true

[exceptions.missing_external_root]
path = "external"
kind = "directory"
classification = "partial_review"
reason = "The canonical external/ root is declared by the source layout contract, but this checkout currently has no vendored external dependency root."
retirement_phase = "POST-CONVERGE"
target = "external/ if vendored dependencies are introduced, or contract optionality review if the root remains intentionally absent"
risk = "low"
created_phase = "CONVERGE-10"
active = true
notes = "Strict validation may pass while the absence is explicit; POST-CONVERGE review should decide whether external/ remains required."

[retired_exceptions.xstack_cache_root]
path = ".xstack_cache"
kind = "directory"
classification = "generated_exception"
reason = "Ignored, untracked XStack cache was removed from the source checkout during POST-CONVERGE-01."
retirement_phase = "POST-CONVERGE-01"
target = "not present in source checkout; regenerated local cache remains ignored by .gitignore"
risk = "low"
created_phase = "CONVERGE-10"
active = false
retired_phase = "POST-CONVERGE-01"
retired_reason = "Root contained no tracked files and was removed as local generated/cache output."
notes = "Retained for audit history only. POST-CONVERGE-00 recorded the FAST failure evidence; future .xstack_cache material is ignored local cache, not source authority."

