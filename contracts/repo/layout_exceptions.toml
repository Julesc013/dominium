path = "__init__.py"
kind = "file"
classification = "compatibility_shim"
reason = "Root package marker remains for compatibility with legacy import assumptions."
retirement_phase = "POST-CONVERGE"
target = "remove after import surface review or document as allowed root file"
risk = "medium"
created_phase = "CONVERGE-10"
active = true
notes = "Do not add additional root package markers without contract update."

