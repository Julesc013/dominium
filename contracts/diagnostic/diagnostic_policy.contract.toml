schema_version = "dominium.diagnostics.policy.v1"
status = "provisional"
last_reviewed = "2026-05-21"
owner = "contracts.diagnostics"

[contract]
id = "dominium.diagnostics.policy.v1"
status = "provisional"
owner = "contracts.diagnostics"
purpose = "Defines stable diagnostic codes, evidence packet expectations, refusal/recovery metadata, and presentation rules."

[policy]
free_text_only_failures_allowed = false
ui_is_authority = false
evidence_packets_are_source_truth = false
warnings_require_classification = true
stable_diagnostics_require_owner = true
stable_diagnostics_require_recovery = true
stable_diagnostics_require_proof = true
stable_diagnostics_require_evidence_expectation = true
diagnostic_text_may_not_replace_code = true
diagnostic_runtime_dispatch_implemented_here = false
normal_gate = "fast_strict"

[naming]
internal_id_prefix = "dominium.diagnostic."
display_code_prefix = "DOM-"
display_code_case = "uppercase_hyphenated"
paths_are_identity = false

[stability]
allowed = ["provisional", "stable", "internal", "generated", "fixture", "historical", "retired"]
stable_requires_proof = true
retired_requires_reason = true
generated_requires_source = true
fixture_is_not_product_contract = true

[evidence]
packet_schema = "contracts/evidence/evidence_packet.schema.json"
ref_schema = "contracts/evidence/evidence_ref.schema.json"
evidence_is_proof_output = true
evidence_is_source_truth = false
validation_failures_require_evidence_ref_when_available = true

[relations]
refusal_registry = "contracts/refusal/refusal_code.registry.json"
command_surface = "contracts/command/command_surface.contract.toml"
public_surface_registry = "contracts/public_surface/public_surface.contract.toml"
event_schema = "contracts/event/event.schema.json"

[presentation]
cli_may_summarize = true
tui_may_group = true
workbench_may_render = true
headless_must_emit_machine_readable = true
presentation_must_not_invent_meaning = true

[aide]
tasks_should_record_diagnostic_codes_when_blocked = true
aide_is_authority = false
evidence_reports_should_reference_codes_when_available = true
